<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALERIA.exe — Sintografía // EsquizoAI</title>
<link rel="icon" href="../el_loko_akarata.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Courier+Prime:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06040a; --green:#00ff41; --green-dim:#00b32c;
  --corrupt:#ff00ff; --acid:#aaff00; --amber:#ffb000;
  --panel:#0a0f0c; --line:#1f3a2a;
  --font-ui:'Share Tech Mono','Courier New',monospace;
  --font-pix:'VT323',monospace;
  --font-read:'Courier Prime','Courier New',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:#cfeede;
  font-family:var(--font-ui);}
body{
  background:
    radial-gradient(ellipse at 15% 0%, rgba(153,0,204,.14) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(170,255,0,.07) 0%, transparent 55%),
    var(--bg);
}
/* scanlines */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);}
::selection{background:var(--corrupt);color:#000;}

header{padding:18px 18px 10px;border-bottom:1px dashed #4a2a5a;}
header h1{font-family:var(--font-pix);font-size:clamp(2rem,6vw,3.4rem);margin:0;color:var(--green);
  letter-spacing:.12em;text-shadow:0 0 12px var(--green),0 0 34px rgba(0,255,65,.25);}
header .sub{font-size:11px;letter-spacing:.18em;color:#aa66cc;text-transform:uppercase;margin-top:4px;}
header .count{color:var(--acid);}

.grid{
  display:grid;gap:10px;padding:16px;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
}
.cell{
  position:relative;aspect-ratio:1/1;overflow:hidden;cursor:pointer;
  background:#0c130f;border:1px solid var(--line);
  box-shadow:0 0 0 1px #000;transition:transform .15s, box-shadow .15s, border-color .15s;
}
.cell:hover{transform:translateY(-2px);border-color:var(--corrupt);
  box-shadow:0 0 18px rgba(255,0,255,.25),0 0 1px #000;}
.cell img{width:100%;height:100%;object-fit:cover;display:block;
  filter:saturate(1.05) contrast(1.02);}
.cell:hover img{filter:saturate(1.3) contrast(1.08) hue-rotate(8deg);}
.cell .cap{
  position:absolute;left:0;right:0;bottom:0;padding:6px 8px;
  background:linear-gradient(0deg,rgba(0,0,0,.85),transparent);
  font-size:11px;color:#dfffe9;letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cell .badge{
  position:absolute;top:6px;left:6px;font-size:8px;letter-spacing:.15em;
  background:var(--corrupt);color:#000;padding:2px 5px;font-weight:bold;
  box-shadow:0 0 8px var(--corrupt);}
.cell .mdl{position:absolute;top:6px;right:6px;font-size:8px;letter-spacing:.1em;
  color:var(--acid);background:rgba(0,0,0,.6);padding:2px 5px;border:1px solid #2a4a1a;}

.empty{padding:60px 20px;text-align:center;color:#778;}
.empty .big{font-family:var(--font-pix);font-size:2rem;color:var(--amber);text-shadow:0 0 10px var(--amber);}

footer{padding:14px 18px 30px;border-top:1px dashed #4a2a5a;color:#5a4a6a;font-size:11px;}
footer a{color:var(--acid);text-decoration:none;}
footer a:hover{text-shadow:0 0 8px var(--acid);}

/* ===== lightbox ===== */
#lb{position:fixed;inset:0;z-index:100;display:none;background:rgba(2,1,5,.94);
  flex-direction:column;}
#lb.open{display:flex;}
#lb .lb-top{display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-bottom:1px solid var(--line);background:var(--panel);}
#lb .lb-title{font-family:var(--font-pix);font-size:1.5rem;color:var(--corrupt);
  text-shadow:0 0 8px var(--corrupt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#lb .lb-x{cursor:pointer;font-size:16px;color:#dfffe9;padding:2px 10px;border:1px solid var(--line);
  background:#0c130f;}
#lb .lb-x:hover{background:#ff2020;color:#000;}
#lb .lb-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;
  min-height:0;padding:10px;}
#lb .lb-stage img{max-width:100%;max-height:100%;object-fit:contain;
  box-shadow:0 0 40px rgba(255,0,255,.15);}
#lb .nav{position:absolute;top:0;bottom:0;width:18%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:32px;color:rgba(255,255,255,.35);user-select:none;}
#lb .nav:hover{color:var(--acid);background:rgba(170,255,0,.05);}
#lb .nav.prev{left:0;} #lb .nav.next{right:0;}
#lb .lb-meta{padding:10px 16px;border-top:1px solid var(--line);background:var(--panel);
  font-family:var(--font-read);font-size:13px;color:#bfe;}
#lb .lb-meta .row{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--font-ui);font-size:11px;
  letter-spacing:.06em;color:#88ccaa;margin-bottom:4px;}
#lb .lb-meta .row b{color:var(--acid);}
#lb .lb-meta .cap{color:#d6c6e6;font-style:italic;}

@media (max-width:760px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(44vw,1fr));gap:6px;padding:10px;}
  #lb .nav{width:26%;}
}
</style>
</head>
<body>
<header>
  <h1>GALERIA.exe</h1>
  <div class="sub">SINTOGRAFÍA · EL LOKO AKRATA · <span class="count" id="count">…</span></div>
</header>

<div class="grid" id="grid"></div>

<footer>
  &gt; drops curados · el códice los suelta primero ·
  <a href="../index.html">⊞ volver al escritorio</a>
</footer>

<!-- lightbox -->
<div id="lb">
  <div class="lb-top">
    <div class="lb-title" id="lbTitle"></div>
    <div class="lb-x" id="lbX">✕ ESC</div>
  </div>
  <div class="lb-stage">
    <div class="nav prev" id="lbPrev">‹</div>
    <img id="lbImg" alt="">
    <div class="nav next" id="lbNext">›</div>
  </div>
  <div class="lb-meta">
    <div class="row" id="lbRow"></div>
    <div class="cap" id="lbCap"></div>
  </div>
</div>

<script>
"use strict";
const $=(s)=>document.querySelector(s);
let DROPS=[], cur=0;

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderGrid(){
  const g=$("#grid");
  $("#count").textContent = DROPS.length ? DROPS.length+" piezas" : "sin drops aún";
  if(!DROPS.length){
    g.innerHTML='<div class="empty"><div class="big">[ SIN DROPS AÚN ]</div>'+
      '<p>la galería está despertando. pronto caen las primeras mutaciones.</p></div>';
    return;
  }
  g.innerHTML="";
  DROPS.forEach((d,i)=>{
    const c=document.createElement("div");
    c.className="cell";
    c.innerHTML =
      (d.unpublished?'<span class="badge">INÉDITO</span>':'')+
      (d.model?'<span class="mdl">'+esc(d.model)+'</span>':'')+
      '<img loading="lazy" src="'+esc(d.file)+'" alt="'+esc(d.title)+'">'+
      '<div class="cap">'+esc(d.title)+'</div>';
    c.addEventListener("click",()=>openLB(i));
    g.appendChild(c);
  });
}

function openLB(i){
  cur=(i+DROPS.length)%DROPS.length;
  const d=DROPS[cur];
  $("#lbImg").src=d.file;
  $("#lbImg").alt=d.title;
  $("#lbTitle").textContent=d.title;
  const bits=[];
  if(d.model) bits.push('<span>modelo: <b>'+esc(d.model)+'</b></span>');
  if(d.date)  bits.push('<span>fecha: <b>'+esc(d.date)+'</b></span>');
  if(d.unpublished) bits.push('<span><b>INÉDITO</b></span>');
  $("#lbRow").innerHTML=bits.join("");
  $("#lbCap").textContent=d.caption||"";
  $("#lb").classList.add("open");
}
function closeLB(){ $("#lb").classList.remove("open"); }
function step(n){ openLB(cur+n); }

$("#lbX").addEventListener("click",closeLB);
$("#lbPrev").addEventListener("click",()=>step(-1));
$("#lbNext").addEventListener("click",()=>step(1));
$("#lb").addEventListener("click",e=>{ if(e.target.id==="lb") closeLB(); });
document.addEventListener("keydown",e=>{
  if(!$("#lb").classList.contains("open")) return;
  if(e.key==="Escape") closeLB();
  else if(e.key==="ArrowLeft") step(-1);
  else if(e.key==="ArrowRight") step(1);
});
// swipe móvil
let tx=0;
$("#lb").addEventListener("touchstart",e=>{ tx=e.changedTouches[0].clientX; },{passive:true});
$("#lb").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50) step(dx<0?1:-1);
},{passive:true});

fetch("manifest.json",{cache:"no-store"})
  .then(r=>r.json())
  .then(j=>{ DROPS=(j&&j.drops)||[]; renderGrid(); })
  .catch(()=>{ DROPS=[]; renderGrid(); });
</script>
</body>
</html>
