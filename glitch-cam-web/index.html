<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GLITCH.CAM — EsquizoAI</title>
<style>
:root{--bg:#000;--fg:#d9f7d9;--acid:#aaff00;--corrupt:#ff2bd6;--amber:#ffb000;--red:#ff2020;--dim:#446}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:"Courier New",monospace;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
#canvas{display:block;max-width:100%;max-height:calc(100% - 48px);background:#000;border:1px solid #111}
#hud{position:absolute;top:4px;left:4px;font-size:10px;line-height:1.5;pointer-events:none;z-index:10;
  background:rgba(0,0,0,.7);padding:4px 8px;border:1px solid var(--dim);max-width:280px}
#hud .bank{color:var(--corrupt)}
#hud .bank.b{color:var(--amber)}
#hud .fx-on{color:var(--acid)}
#hud .fx-off{color:#223}
#hud .hdr{color:var(--corrupt);font-size:11px;margin-bottom:3px}
#hud .fps{color:var(--dim)}
#status{position:absolute;bottom:4px;left:4px;font-size:9px;color:var(--dim);background:rgba(0,0,0,.7);padding:2px 6px;pointer-events:none;z-index:10}
#camPrompt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:20}
#camPrompt button{font-family:inherit;font-size:14px;padding:10px 24px;background:var(--bg);color:var(--acid);border:1px solid var(--acid);cursor:pointer;margin-top:12px;letter-spacing:2px}
#camPrompt button:hover{border-color:var(--corrupt);box-shadow:0 0 12px var(--corrupt)}
#camPrompt p{color:var(--dim);font-size:13px;text-align:center;max-width:400px;line-height:1.6}
.foot{position:absolute;bottom:0;left:0;right:0;height:24px;display:flex;align-items:center;justify-content:space-between;padding:0 8px;font-size:9px;color:var(--dim);border-top:1px solid #111}
.foot a{color:var(--acid);text-decoration:none}
.foot a:hover{text-decoration:underline}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="hud"></div>
<div id="status"></div>

<div id="camPrompt">
  <p>📹 GLITCH.CAM<br>glitch en vivo sobre webcam</p>
  <button id="btnStart">⯁ ACTIVAR CÁMARA</button>
  <p style="font-size:10px;margin-top:8px">permite acceso a la cámara para empezar</p>
</div>

<div class="foot">
  <a href="../index.html">volver al OS</a>
  <span>g j o y z = efectos · ESPACIO = banco · p i e = paleta/dither/crt · r = reset</span>
  <span id="fpsFoot">— fps</span>
</div>

<script>
const W=640, H=360, INTENSITY=0.7;
let camActive=false, bank=0, intensity=INTENSITY;
let effectsA=[0,0,0,0,0,0], effectsB=[0,0,0,0,0,0];
let paltMode=0, dithMode=0, emulMode=0;
let fps=0, frameCount=0, lastFpsTime=performance.now();
let feedbackBuf=null, vhsLineBuf=null;

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});
canvas.width=W;canvas.height=H;
const hudEl=document.getElementById('hud');
const statusEl=document.getElementById('status');
const fpsFoot=document.getElementById('fpsFoot');
const offCanvas=document.createElement('canvas');offCanvas.width=W;offCanvas.height=H;
const offCtx=offCanvas.getContext('2d',{willReadFrequently:true});
const video=document.createElement('video');video.playsInline=true;video.muted=true;

// ========== CAMERA ==========
document.getElementById('btnStart').addEventListener('click',async()=>{
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:W,height:H,facingMode:'user'},audio:false});
    video.srcObject=stream;video.play();
    camActive=true;document.getElementById('camPrompt').style.display='none';
    feedbackBuf=null;loop();
  }catch(e){
    statusEl.textContent='cámara denegada o no disponible: '+e.message;
  }
});

// ========== EFFECT EFFECTS ==========
// palette LUT
function makePALTLUT(mode){
  const lut=new Uint8ClampedArray(256*3);let i=0;
  if(mode===1){for(let r=0;r<256;r++)for(let g=0;g<256;g++){const j=i;lut[j]=Math.min(255,r*3);lut[j+1]=Math.min(255,g*1.2);lut[j+2]=0;i+=3;}} // green toxic
  else if(mode===2){for(let r=0;r<256;r++)for(let g=0;g<256;g++){const j=i,l=Math.floor((r+g)/2);lut[j]=l;lut[j+1]=Math.floor(l*.7);lut[j+2]=Math.floor(l*.9);i+=3;}} // mono sepia
  else if(mode===3){for(let r=0;r<256;r++)for(let g=0;g<256;g++){const j=i,l=r*(1+g/512);lut[j]=255-l;lut[j+1]=l*.5;lut[j+2]=l*.8;i+=3;}} // invert purple
  else if(mode===4){for(let r=0;r<256;r++)for(let g=0;g<256;g++){const j=i,l=(r+g)/2;lut[j]=l>128?255:0;lut[j+1]=l>128?255:0;lut[j+2]=l>128?255:0;i+=3;}} // harsh BW
  else if(mode===5){for(let r=0;r<256;r++)for(let g=0;g<256;g++){const j=i,l=r/g>1.5?r:g;lut[j]=0;lut[j+1]=Math.min(255,l*2);lut[j+2]=0;i+=3;}} // toxic only
  return lut;
}
let paltLUT=null;
function effectPALT(data,mode){
  if(!mode) return;
  if(!paltLUT||paltLUT._mode!==mode){paltLUT=makePALTLUT(mode);paltLUT._mode=mode;}
  const d=data.data,n=d.length;
  for(let i=0;i<n;i+=4){
    const idx=(d[i]+d[i+1]*256)*3;d[i]=paltLUT[idx];d[i+1]=paltLUT[idx+1];d[i+2]=paltLUT[idx+2];
  }
}

// dither (Bayer 8x8 ordered)
const BAYER8=[
  [1,49,13,61,4,52,16,64],[33,17,45,29,36,20,48,32],
  [9,57,5,53,12,60,8,56],[41,25,37,21,44,28,40,24],
  [3,51,15,63,2,50,14,62],[35,19,47,31,34,18,46,30],
  [11,59,7,55,10,58,6,54],[43,27,39,23,42,26,38,22]
].map(r=>r.map(v=>(v-1)/64));
function effectDITH(data,mode){
  if(!mode) return;
  const m=mode===1?4:mode===2?8:mode===3?2:1;
  const d=data.data,w=data.width;
  for(let y=0;y<data.height;y++)for(let x=0;x<w;x++){
    const i=(y*w+x)*4,t=BAYER8[y%8][x%8]*m;
    for(let c=0;c<3;c++)d[i+c]=d[i+c]<t*255?0:255;
  }
}

// CRT emulation (scanlines + chroma shift)
function effectEMUL(data,mode){
  if(!mode) return;
  const d=data.data,w=data.width;
  if(mode>=1){ // scanlines
    for(let y=0;y<data.height;y+=2)for(let x=0;x<w;x++){
      const i=(y*w+x)*4;d[i]=Math.floor(d[i]*.7);d[i+1]=Math.floor(d[i+1]*.7);d[i+2]=Math.floor(d[i+2]*.7);
    }
  }
  if(mode>=2){ // chroma aberration
    const shift=3;
    for(let y=0;y<data.height;y++)for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      if(x+shift<w){const j=(y*w+x+shift)*4;d[j]=d[i];}
      if(x-shift>=0){const j=(y*w+x-shift)*4;d[j+2]=d[i+2];}
    }
  }
}

// feedback (accumulation buffer)
function applyFEEDBACK(){
  if(!feedbackBuf) return;
  offCtx.globalAlpha=0.55;
  offCtx.drawImage(feedbackBuf,0,0,W,H);
  offCtx.globalAlpha=1.0;
}

// kaleido (radial mirror)
function effectKALEIDO(data,strength){
  const d=data.data,w=data.width,h=data.height,midW=w>>1,midH=h>>1;
  const slices=strength||4;
  const copy=new Uint8ClampedArray(d);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=(y*w+x)*4;
    const ax=Math.abs(x-midW),ay=Math.abs(y-midH);
    const sx=midW-ax,sy=midH-ay;
    const si=(sy*w+sx)*4;
    d[i]=copy[si];d[i+1]=copy[si+1];d[i+2]=copy[si+2];
  }
}

// VHS (line displacement + noise)
function effectVHS(data,strength){
  const d=data.data,w=data.width,h=data.height,sw=strength||1;
  for(let y=0;y<h;y++){
    const offset=Math.floor((Math.sin(y*0.3+frameCount*0.5)*sw*12));
    if(offset===0) continue;
    const row=y*w*4;
    const copy=new Uint8ClampedArray(d.slice(row,row+w*4));
    for(let x=0;x<w;x++){
      const i=(row+x*4),si=(row+((x+offset+w)%w)*4);
      d[i]=copy[(x*4)];d[i+1]=copy[(x*4)+1];d[i+2]=copy[(x*4)+2];
    }
  }
}

// bloom (glow)
function applyBLOOM(){
  offCtx.filter='blur(4px)';
  offCtx.globalCompositeOperation='lighter';
  offCtx.drawImage(offCanvas,0,0,W,H);
  offCtx.globalCompositeOperation='source-over';
  offCtx.filter='none';
}

// edge detection (Sobel)
function effectEDGE(data){
  const d=data.data,w=data.width,h=data.height;
  const gray=new Float32Array(w*h);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=(y*w+x)*4;gray[y*w+x]=d[i]*.3+d[i+1]*.59+d[i+2]*.11;
  }
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    const tl=gray[(y-1)*w+x-1],tc=gray[(y-1)*w+x],tr=gray[(y-1)*w+x+1];
    const ml=gray[y*w+x-1],mr=gray[y*w+x+1];
    const bl=gray[(y+1)*w+x-1],bc=gray[(y+1)*w+x],br=gray[(y+1)*w+x+1];
    const gx=-tl+tr-2*ml+2*mr-bl+br,gy=-tl-2*tc-tr+bl+2*bc+br;
    const mag=Math.min(255,Math.sqrt(gx*gx+gy*gy)*1.5);
    const i=(y*w+x)*4;d[i]=mag;d[i+1]=mag*.7;d[i+2]=mag*.3;
  }
}

// ========== MAIN LOOP ==========
function drawHUD(){
  const a=effectsA,b=effectsB;
  const namesA=['OFF','FEEDBACK: túnel','SLIT-SCAN: tiempo','TUNNEL: polar','KALEIDO: mandala','BLOOM: glow'];
  const namesB=['OFF','VHS: cinta','STUTTER: roto','SOLAR: falso color','EDGE: neón','HALFTONE: imprenta'];
  const keysA=['','g','j','o','y','z'],keysB=['','g','j','o','y','z'];
  const active=bank===0?a:b,names=bank===0?namesA:namesB,keys=bank===0?keysA:keysB;
  let h=`<div class="hdr">📹 GLITCH.CAM</div>`;
  h+=`<div class="bank${bank?' b':''}">BANCO: ${bank==0?'A':'B'}</div>`;
  h+=`<div>intensidad: ${intensity.toFixed(1)}</div>`;
  h+=`<div style="margin-top:2px">`;
  for(let i=1;i<=5;i++){
    h+=`<div class="fx-${active[i]?'on':'off'}">${keys[i]} · ${names[i]}: ${active[i]?'MODO '+active[i]:'OFF'}</div>`;
  }
  h+=`</div>`;
  h+=`<div style="margin-top:2px">p · PALT: ${paltMode?'MODO '+paltMode:'OFF'}</div>`;
  h+=`<div>i · DITH: ${dithMode?'MODO '+dithMode:'OFF'}</div>`;
  h+=`<div>e · CR T: ${emulMode?'MODO '+emulMode:'OFF'}</div>`;
  h+=`<div class="fps">${fps} fps</div>`;
  hudEl.innerHTML=h;
}

function loop(){
  if(!camActive) return;
  requestAnimationFrame(loop);
  frameCount++;

  // reset canvas state EVERY frame
  offCtx.globalAlpha=1.0;
  offCtx.globalCompositeOperation='source-over';
  offCtx.filter='none';

  // capture fresh frame
  offCtx.drawImage(video,0,0,W,H);
  let imgData=offCtx.getImageData(0,0,W,H);

  // pixel effects (modify ImageData)
  if(paltMode) effectPALT(imgData,paltMode);
  if(dithMode) effectDITH(imgData,dithMode);
  if(effectsA[4]) effectKALEIDO(imgData,effectsA[4]*0.5);
  if(effectsB[1]) effectVHS(imgData,effectsB[1]*intensity);
  if(effectsB[4]) effectEDGE(imgData);
  offCtx.putImageData(imgData,0,0);

  // feedback: draw previous frame with alpha OVER current frame
  if(effectsA[1] && feedbackBuf){
    offCtx.globalAlpha=0.55;
    offCtx.drawImage(feedbackBuf,0,0,W,H);
    offCtx.globalAlpha=1.0;
  }

  // bloom (canvas compositing)
  if(effectsA[5]){
    offCtx.filter='blur(4px)';
    offCtx.globalCompositeOperation='lighter';
    offCtx.drawImage(offCanvas,0,0,W,H);
    offCtx.globalCompositeOperation='source-over';
    offCtx.filter='none';
  }

  // CRT emulation
  if(emulMode){
    imgData=offCtx.getImageData(0,0,W,H);
    effectEMUL(imgData,emulMode);
    offCtx.putImageData(imgData,0,0);
  }

  // save feedback buffer AFTER all effects (for next frame)
  if(effectsA[1]){
    if(!feedbackBuf||feedbackBuf.width!==W){feedbackBuf=document.createElement('canvas');feedbackBuf.width=W;feedbackBuf.height=H;}
    feedbackBuf.getContext('2d').drawImage(offCanvas,0,0,W,H);
  }

  // render to visible canvas
  ctx.drawImage(offCanvas,0,0,canvas.width,canvas.height);

  // HUD + FPS
  if(frameCount%10===0){
    const now=performance.now();
    fps=Math.round(10000/(now-lastFpsTime));
    lastFpsTime=now;
    drawHUD();
    fpsFoot.textContent=fps+' fps';
  }
}

// ========== KEYBOARD ==========
const KEYS_A={g:1,j:2,o:3,y:4,z:5},KEYS_B={g:1,j:2,o:3,y:4,z:5};
window.addEventListener('keydown',e=>{
  if(!camActive) return;
  const k=e.key.toLowerCase();
  const active=bank===0?effectsA:effectsB,keyMap=bank===0?KEYS_A:KEYS_B;

  if(k===' '){e.preventDefault();bank=bank?0:1;statusEl.textContent='banco '+(bank?'B':'A');return;}
  if(k==='r'){effectsA=[0,0,0,0,0,0];effectsB=[0,0,0,0,0,0];paltMode=0;dithMode=0;emulMode=0;feedbackBuf=null;statusEl.textContent='reset';return;}
  if(k==='p'){paltMode=(paltMode+1)%6;statusEl.textContent='PALT: '+(paltMode?'MODO '+paltMode:'OFF');return;}
  if(k==='i'){dithMode=(dithMode+1)%4;statusEl.textContent='DITH: '+(dithMode?'MODO '+dithMode:'OFF');return;}
  if(k==='e'){emulMode=(emulMode+1)%3;statusEl.textContent='EMUL: '+(emulMode?'MODO '+emulMode:'OFF');return;}
  if(k==='+'||k==='='){intensity=Math.min(1,intensity+.1);statusEl.textContent='intensidad: '+intensity.toFixed(1);return;}
  if(k==='-'){intensity=Math.max(0,intensity-.1);statusEl.textContent='intensidad: '+intensity.toFixed(1);return;}

  if(keyMap[k]!==undefined){
    const idx=keyMap[k];
    const modes=idx===4?3:idx===3?4:idx===5?2:2;
    active[idx]=(active[idx]+1)%(modes+1);
    const names=bank===0?['','FEEDBACK','SLIT-SCAN','TUNNEL','KALEIDO','BLOOM']:['','VHS','STUTTER','SOLAR','EDGE','HALFTONE'];
    statusEl.textContent=names[idx]+': '+(active[idx]?'MODO '+active[idx]:'OFF');
  }
});
</script>
</body>
</html>
