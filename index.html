<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ESQUIZOAI_OS v0.98 — [ACID]</title>
<link rel="icon" href="el_loko_akarata.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040008;
  --green:#00ff41; --green-dim:#00b32c;
  --amber:#ffb000; --red:#ff2020;
  --corrupt:#ff00ff; --acid:#aaff00; --purple:#9900cc;

  /* win98 chrome, teñido acid */
  --win-face:#101814;          /* "gris" del SO, en verde-negro */
  --win-face-2:#0a0f0c;
  --win-light:#1f3a2a;         /* bisel claro */
  --win-dark:#000;             /* bisel oscuro */
  --win-hi:#2a5a3a;
  --title-a:#005522;           /* barra título activa */
  --title-b:#00aa44;
  --title-inactive-a:#1a1a22;
  --title-inactive-b:#33334a;
  --text:#aaffcc;
  --font-ui:'Share Tech Mono','Courier New',monospace;
  --font-pix:'VT323',monospace;
  --font-read:'Courier Prime','Courier New',monospace;
}

*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
  overflow:hidden;
  /* flecha Win98 pixelada (SVG inline, cero archivos externos) */
  cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='22'%20height='26'%3E%3Cpath%20d='M3%202%20L3%2021%20L8%2016%20L11%2023%20L14%2022%20L11%2015%20L18%2015%20Z'%20fill='white'%20stroke='black'%20stroke-width='1.5'%20stroke-linejoin='round'/%3E%3C/svg%3E") 3 2, default;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  touch-action:manipulation;
}
::selection{background:var(--corrupt);color:#000;}

/* mano sobre clicables, I-beam sobre texto leíble */
.icon,.fitem,.tb-btn,.btn98,#start,.task,.sm-item,.win .menubar span{cursor:pointer;}
.textwin,.textwin *{cursor:text;}
.textwin a{cursor:pointer;}
.textwin{user-select:text;-webkit-user-select:text;}

/* ===== wallpaper acid (100% css) ===== */
#desktop{
  position:fixed; inset:0; bottom:calc(42px + env(safe-area-inset-bottom));
  background:
    radial-gradient(ellipse at 18% 22%, rgba(153,0,204,0.18) 0%, transparent 45%),
    radial-gradient(ellipse at 82% 78%, rgba(170,255,0,0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 120%, rgba(255,0,255,0.12) 0%, transparent 55%),
    linear-gradient(160deg,#04060a,#0a0014 60%,#000 100%);
  overflow:hidden;
}
#desktop::before{ /* grid perspectiva */
  content:'';position:absolute;inset:-20% -20% -40% -20%;
  background-image:
    linear-gradient(rgba(0,255,65,0.07) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,65,0.07) 1px,transparent 1px);
  background-size:42px 42px;
  transform:perspective(420px) rotateX(58deg);
  transform-origin:center 80%;
  pointer-events:none;
}
#desktop::after{ /* vignette */
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,0.82) 100%);
  pointer-events:none;
}
/* scanlines globales */
#crt{
  position:fixed;inset:0;z-index:9000;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.10) 2px,rgba(0,0,0,0.10) 4px);
  mix-blend-mode:multiply;
}
#crt::after{ /* flicker sutil */
  content:'';position:absolute;inset:0;background:rgba(0,255,65,0.012);
  animation:flick 7s steps(2) infinite;
}
@keyframes flick{0%,97%{opacity:0;}98%{opacity:1;}100%{opacity:0;}}

/* watermark del escritorio */
#wm-brand{
  position:absolute;right:14px;bottom:10px;text-align:right;
  font-family:var(--font-pix);color:rgba(0,255,65,.25);
  font-size:13px;letter-spacing:.15em;line-height:1.2;pointer-events:none;z-index:1;
}
#wm-brand b{display:block;font-size:22px;color:rgba(255,0,255,.35);}

/* ===== wallpaper centerpiece: favicon + ESQUIZOAI con glitch ===== */
#wallpaper{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(.3rem,1.5vh,1rem);
}
/* glow reactivo al audio (REPRODUCTOR / ambiente) — no choca con las animaciones del logo */
#wp-glow{
  position:absolute;left:50%;top:44%;transform:translate(-50%,-50%) scale(1);
  width:min(64vw,460px);aspect-ratio:1/1;border-radius:50%;z-index:0;
  background:radial-gradient(circle, rgba(0,255,65,.30) 0%, rgba(255,0,255,.14) 42%, transparent 70%);
  opacity:0;mix-blend-mode:screen;pointer-events:none;will-change:opacity,transform;
}
.wp-logo{
  position:relative;
  width:clamp(130px,20vw,250px);
  aspect-ratio:1/1;
  background:url('el_loko_akarata.png') center/contain no-repeat;
  opacity:.95;
  -webkit-mask:radial-gradient(ellipse 72% 72% at 50% 46%, #000 48%, transparent 76%);
          mask:radial-gradient(ellipse 72% 72% at 50% 46%, #000 48%, transparent 76%);
  animation:logoFloat 7s ease-in-out infinite, logoHue 9s infinite;
}
.wp-logo::before,.wp-logo::after{
  content:'';position:absolute;inset:0;
  background:url('el_loko_akarata.png') center/contain no-repeat;
  -webkit-mask:radial-gradient(ellipse 72% 72% at 50% 46%, #000 48%, transparent 76%);
          mask:radial-gradient(ellipse 72% 72% at 50% 46%, #000 48%, transparent 76%);
  mix-blend-mode:screen;opacity:0;
}
.wp-logo::before{ /* fantasma rojo */
  filter:sepia(1) saturate(8) hue-rotate(-40deg) brightness(1.2);
  animation:glitchR 2.6s steps(1) infinite;
}
.wp-logo::after{ /* fantasma cyan */
  filter:sepia(1) saturate(6) hue-rotate(150deg) brightness(1.15);
  animation:glitchC 3.3s steps(1) infinite;
}
.wp-title{
  position:relative;
  font-family:var(--font-pix);
  font-size:clamp(2rem,9vw,5.5rem);
  letter-spacing:.16em;color:var(--green);
  text-shadow:0 0 12px var(--green),0 0 38px rgba(0,255,65,.28);
  animation:titleFlick 7s infinite;
}
.wp-title::before,.wp-title::after{
  content:attr(data-text);position:absolute;left:0;top:0;width:100%;height:100%;
  overflow:hidden;letter-spacing:.16em;
}
.wp-title::before{ /* magenta */
  color:var(--corrupt);text-shadow:0 0 10px var(--corrupt);
  animation:tgM 3s infinite steps(2);
}
.wp-title::after{ /* cyan */
  color:#00ffff;text-shadow:0 0 10px #00ffff;
  animation:tgC 2.3s infinite steps(2);
}

@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-9px) scale(1.012);}}
@keyframes logoHue{
  0%,88%,100%{filter:drop-shadow(0 0 18px rgba(255,0,255,.30));}
  90%{filter:drop-shadow(0 0 22px rgba(0,255,65,.5)) hue-rotate(40deg) contrast(1.4);}
  92%{filter:hue-rotate(-30deg) saturate(2.2) brightness(1.2);}
  94%{filter:drop-shadow(0 0 18px rgba(255,0,255,.30));}
}
@keyframes glitchR{
  0%,89%,100%{opacity:0;transform:translate(0,0);clip-path:inset(0 0 0 0);}
  90%{opacity:.7;transform:translate(-5px,2px);clip-path:inset(8% 0 62% 0);}
  92%{opacity:.7;transform:translate(5px,-2px);clip-path:inset(45% 0 28% 0);}
  94%{opacity:.6;transform:translate(-4px,1px);clip-path:inset(72% 0 6% 0);}
  96%{opacity:.5;transform:translate(3px,0);clip-path:inset(20% 0 50% 0);}
}
@keyframes glitchC{
  0%,86%,100%{opacity:0;transform:translate(0,0);clip-path:inset(0 0 0 0);}
  87%{opacity:.6;transform:translate(5px,-2px);clip-path:inset(15% 0 55% 0);}
  90%{opacity:.6;transform:translate(-5px,2px);clip-path:inset(55% 0 18% 0);}
  93%{opacity:.5;transform:translate(4px,1px);clip-path:inset(80% 0 4% 0);}
}
@keyframes titleFlick{
  0%,90%,100%{opacity:1;transform:translate(0);}
  91%{opacity:.85;transform:translate(2px,-1px) skewX(-3deg);}
  93%{opacity:1;transform:translate(-2px,1px);}
}
@keyframes tgM{
  0%,88%,100%{opacity:0;transform:translate(0);clip-path:inset(0 0 0 0);}
  89%{opacity:.85;transform:translate(-3px,0);clip-path:inset(0 0 55% 0);}
  92%{opacity:.85;transform:translate(3px,0);clip-path:inset(50% 0 0 0);}
}
@keyframes tgC{
  0%,85%,100%{opacity:0;transform:translate(0);clip-path:inset(0 0 0 0);}
  86%{opacity:.7;transform:translate(3px,0);clip-path:inset(0 0 60% 0);}
  90%{opacity:.7;transform:translate(-3px,0);clip-path:inset(45% 0 0 0);}
}

/* ===== iconos escritorio ===== */
#icons{
  position:absolute;inset:0;padding:12px 8px;z-index:2;
  display:grid;grid-auto-flow:column;
  grid-template-rows:repeat(auto-fill,90px);
  grid-auto-columns:84px;gap:2px 6px;
  justify-content:start;align-content:start;
}
.icon{
  width:84px;display:flex;flex-direction:column;align-items:center;
  gap:5px;padding:6px 3px;cursor:pointer;border:1px solid transparent;text-align:center;
}
.icon:hover{background:rgba(0,255,65,.08);}
.icon.sel{background:rgba(255,0,255,.18);border:1px dotted var(--corrupt);}
.icon .gl{
  font-size:32px;line-height:1;filter:drop-shadow(0 0 6px currentColor);
  width:46px;height:46px;display:flex;align-items:center;justify-content:center;
}
.icon .lb{
  font-size:11px;color:#d6ffe6;line-height:1.15;word-break:break-word;
  text-shadow:0 0 4px #000,1px 1px 0 #000;
}

/* ===== ventanas ===== */
.win{
  position:absolute;min-width:240px;min-height:120px;
  background:var(--win-face);
  border-top:2px solid var(--win-light);
  border-left:2px solid var(--win-light);
  border-right:2px solid var(--win-dark);
  border-bottom:2px solid var(--win-dark);
  box-shadow:0 0 0 1px #000, 0 8px 30px rgba(0,0,0,.7), 0 0 22px rgba(0,255,65,.10);
  display:flex;flex-direction:column;z-index:10;
  animation:winpop .12s ease-out;
}
@keyframes winpop{from{transform:scale(.96);opacity:.4;}to{transform:scale(1);opacity:1;}}
.win.max{inset:0 0 34px 0 !important;width:auto!important;height:auto!important;}
.win .titlebar{
  height:24px;flex:0 0 24px;display:flex;align-items:center;gap:6px;
  padding:0 3px 0 6px;cursor:grab;
  background:linear-gradient(90deg,var(--title-inactive-a),var(--title-inactive-b));
  color:#9aa;font-size:12px;letter-spacing:.05em;user-select:none;
}
.win.focused .titlebar{
  background:linear-gradient(90deg,var(--title-a),var(--title-b));
  color:#dfffe9;text-shadow:0 0 6px rgba(0,255,65,.6);
}
.win .titlebar .ti-ico{font-size:13px;}
.win .titlebar .ti-tx{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:bold;}
.win .titlebar .tb-btns{display:flex;gap:3px;}
.tb-btn{
  width:20px;height:18px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:var(--font-ui);color:#000;cursor:pointer;
  background:var(--win-face);
  border-top:1px solid var(--win-light);border-left:1px solid var(--win-light);
  border-right:1px solid var(--win-dark);border-bottom:1px solid var(--win-dark);
  color:#bfffcf;
}
.tb-btn:active{border-top:1px solid var(--win-dark);border-left:1px solid var(--win-dark);
  border-right:1px solid var(--win-light);border-bottom:1px solid var(--win-light);}
.tb-btn.x:hover{background:var(--red);color:#000;}
.win .menubar{
  flex:0 0 auto;display:flex;gap:2px;padding:2px 4px;font-size:12px;
  border-bottom:1px solid var(--win-dark);color:#8fdfa6;background:var(--win-face-2);
}
.win .menubar span{padding:1px 7px;cursor:default;}
.win .menubar span:hover{background:var(--green-dim);color:#000;}
.win .body{
  flex:1;overflow:auto;background:var(--win-face-2);
  border-top:1px solid var(--win-dark);
}
.win .statusbar{
  flex:0 0 18px;display:flex;align-items:center;padding:0 6px;font-size:10px;
  color:#6fae84;border-top:1px solid var(--win-dark);background:var(--win-face);
  letter-spacing:.04em;
}
/* scrollbars retro */
.win .body::-webkit-scrollbar{width:14px;height:14px;}
.win .body::-webkit-scrollbar-track{background:#0c130f;}
.win .body::-webkit-scrollbar-thumb{background:var(--win-hi);border:1px solid #000;}

/* ===== ventana-app (artefacto en iframe) ===== */
.appwrap{display:flex;flex-direction:column;height:100%;}
.app-toolbar{
  flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:3px 6px;
  background:var(--win-face);border-bottom:1px solid var(--win-dark);
  font-size:11px;color:#bfffcf;
}
.app-toolbar .ab{
  cursor:pointer;padding:2px 9px;color:#bfffcf;background:var(--win-face-2);
  border-top:1px solid var(--win-light);border-left:1px solid var(--win-light);
  border-right:1px solid var(--win-dark);border-bottom:1px solid var(--win-dark);
}
.app-toolbar .ab:hover{background:var(--green-dim);color:#000;}
.app-toolbar .ab:active{border-top:1px solid var(--win-dark);border-left:1px solid var(--win-dark);
  border-right:1px solid var(--win-light);border-bottom:1px solid var(--win-light);}
.app-toolbar .app-url{margin-left:auto;opacity:.65;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:58%;}
.app-frame{flex:1;width:100%;border:0;background:#000;display:block;}

/* ===== VOMIT.SH (terminal) ===== */
.term{display:flex;flex-direction:column;height:100%;background:#030604;}
.term-bar{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:2px 6px;
  border-bottom:1px solid var(--win-dark);background:var(--win-face);font-size:10px;color:#6fae84;letter-spacing:.05em;}
.term-bar .sndtgl{margin-left:auto;cursor:pointer;padding:1px 7px;border:1px solid var(--win-dark);
  background:var(--win-face-2);color:#bfffcf;}
.term-bar .sndtgl:hover{background:var(--green-dim);color:#000;}
.term-out{flex:1;overflow-y:auto;padding:8px 10px;font-family:var(--font-ui);font-size:13px;
  line-height:1.45;color:#9affb6;white-space:pre-wrap;word-break:break-word;
  text-shadow:0 0 6px rgba(0,255,65,.25);}
.term-out .c-cmd{color:#dfffe9;}            /* eco del comando */
.term-out .c-acid{color:var(--acid);}
.term-out .c-corrupt{color:var(--corrupt);}
.term-out .c-amber{color:var(--amber);}
.term-out .c-red{color:var(--red);}
.term-out .c-dim{color:#5a8a6a;}
.term-line{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:4px 10px 8px;
  border-top:1px solid #0c1a10;}
.term-prompt{color:var(--corrupt);font-family:var(--font-ui);font-size:13px;white-space:nowrap;
  text-shadow:0 0 6px var(--corrupt);}
.term-in{flex:1;background:transparent;border:none;outline:none;color:#dfffe9;
  font-family:var(--font-ui);font-size:13px;caret-color:var(--acid);}
.term-out::-webkit-scrollbar{width:12px;} .term-out::-webkit-scrollbar-track{background:#050a07;}
.term-out::-webkit-scrollbar-thumb{background:var(--win-hi);border:1px solid #000;}

/* botón "Mostrar escritorio" en la taskbar */
#showdesk{
  width:24px;height:26px;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#bfffcf;cursor:pointer;flex:0 0 auto;
  background:var(--win-face-2);
  border-top:1px solid var(--win-light);border-left:1px solid var(--win-light);
  border-right:1px solid var(--win-dark);border-bottom:1px solid var(--win-dark);
}
#showdesk:hover{background:var(--green-dim);color:#000;}
#showdesk:active{border-top:1px solid var(--win-dark);border-left:1px solid var(--win-dark);
  border-right:1px solid var(--win-light);border-bottom:1px solid var(--win-light);}

/* ===== explorador (carpeta) ===== */
.explorer{padding:10px;display:grid;grid-template-columns:repeat(auto-fill,88px);
  grid-auto-rows:88px;gap:6px;align-content:start;}
.fitem{display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 3px;
  cursor:pointer;border:1px solid transparent;text-align:center;}
.fitem:hover{background:rgba(0,255,65,.1);}
.fitem.sel{background:rgba(255,0,255,.18);border:1px dotted var(--corrupt);}
.fitem .gl{font-size:28px;line-height:1;filter:drop-shadow(0 0 5px currentColor);}
.fitem .lb{font-size:10px;color:#d6ffe6;line-height:1.1;word-break:break-word;}

/* ===== ventana de texto (readme/about) ===== */
.textwin{padding:16px 20px;font-family:var(--font-read);color:#cfeede;
  font-size:13px;line-height:1.7;}
.textwin h1{font-family:var(--font-pix);color:var(--green);font-size:2rem;margin:.2em 0 .4em;
  text-shadow:0 0 10px var(--green);letter-spacing:.08em;}
.textwin h2{font-family:var(--font-pix);color:var(--corrupt);font-size:1.4rem;margin:1em 0 .3em;
  text-shadow:0 0 8px var(--corrupt);}
.textwin a{color:var(--acid);}
.textwin .big{font-family:var(--font-pix);font-size:1.6rem;color:var(--amber);text-shadow:0 0 8px var(--amber);}
.textwin .blink{animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0;}}

/* ===== diálogo error ===== */
.dlg .body{padding:18px 20px;display:flex;gap:16px;align-items:flex-start;
  font-family:var(--font-ui);color:#dfffe9;font-size:13px;line-height:1.6;}
.dlg .ico{font-size:38px;filter:drop-shadow(0 0 8px var(--red));}
.dlg .acts{display:flex;gap:10px;justify-content:center;padding:0 0 14px;}
.btn98{
  min-width:80px;padding:5px 14px;font-family:var(--font-ui);font-size:12px;cursor:pointer;
  color:#dfffe9;background:var(--win-face);
  border-top:1px solid var(--win-light);border-left:1px solid var(--win-light);
  border-right:1px solid var(--win-dark);border-bottom:1px solid var(--win-dark);
}
.btn98:active{border-top:1px solid var(--win-dark);border-left:1px solid var(--win-dark);
  border-right:1px solid var(--win-light);border-bottom:1px solid var(--win-light);}
.btn98:hover{background:var(--green-dim);color:#000;}

/* ===== taskbar ===== */
#taskbar{
  position:fixed;left:0;right:0;bottom:0;height:34px;z-index:8000;
  display:flex;align-items:center;gap:4px;
  padding:3px 4px calc(3px + env(safe-area-inset-bottom));
  box-sizing:content-box;
  background:var(--win-face);
  border-top:2px solid var(--win-light);
}
#start{
  display:flex;align-items:center;gap:6px;height:26px;padding:0 12px 0 8px;
  font-family:var(--font-pix);font-size:18px;letter-spacing:.06em;cursor:pointer;
  color:#000;background:linear-gradient(180deg,var(--acid),var(--green-dim));
  border-top:1px solid #d6ffae;border-left:1px solid #d6ffae;
  border-right:1px solid #000;border-bottom:1px solid #000;
  text-shadow:0 0 4px rgba(255,255,255,.4);font-weight:bold;
}
#start:active,#start.open{
  background:linear-gradient(180deg,var(--green-dim),#063);
  border-top:1px solid #000;border-left:1px solid #000;
  border-right:1px solid #d6ffae;border-bottom:1px solid #d6ffae;
}
#start .sk{font-size:20px;}
#tasks{flex:1;display:flex;gap:4px;overflow:hidden;height:100%;align-items:center;}
.task{
  max-width:170px;min-width:54px;height:26px;display:flex;align-items:center;gap:6px;
  padding:0 8px;font-size:11px;color:#bfffcf;cursor:pointer;overflow:hidden;
  background:var(--win-face-2);
  border-top:1px solid var(--win-light);border-left:1px solid var(--win-light);
  border-right:1px solid var(--win-dark);border-bottom:1px solid var(--win-dark);
  white-space:nowrap;
}
.task .tt{overflow:hidden;text-overflow:ellipsis;}
.task.active{
  background:linear-gradient(180deg,#063,#021);color:#dfffe9;
  border-top:1px solid var(--win-dark);border-left:1px solid var(--win-dark);
  border-right:1px solid var(--win-light);border-bottom:1px solid var(--win-light);
}
#tray{
  height:26px;display:flex;align-items:center;gap:8px;padding:0 10px;
  font-size:12px;color:#bfffcf;
  border-top:1px solid var(--win-dark);border-left:1px solid var(--win-dark);
  border-right:1px solid var(--win-light);border-bottom:1px solid var(--win-light);
  background:var(--win-face-2);
}
#tray .ank{color:var(--corrupt);text-shadow:0 0 6px var(--corrupt);}
#clock{font-variant-numeric:tabular-nums;}
#amb{cursor:pointer;user-select:none;color:#7fdf9f;font-size:11px;letter-spacing:.04em;}
#amb:hover{color:#cfeede;}
#amb.on{color:var(--acid);text-shadow:0 0 8px var(--acid);}
#infection{font-size:11px;letter-spacing:.04em;color:#b48cd0;}
#infection b{color:var(--corrupt);}

/* ¿una URL apunta al escritorio mismo (raíz index.html / esta página)? */

       return u.origin===location.origin && DESKTOP_PATHS.has(u.pathname); }
  catch(e){ return false; }

/* =========================================================
   AcidAudio — bus de audio del OS (ambiente daemon + beep)
   ========================================================= */
const AcidAudio = (()=>{
  let ctx=null, amb=null;
  function ac(){
    if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } }
    if(ctx.state==="suspended") ctx.resume();
    return ctx;
  }
  function beep(){
    const a=ac(); if(!a) return;
    try{ const o=a.createOscillator(), g=a.createGain(); o.type="square";
      o.frequency.value=400+Math.random()*160; g.gain.value=0.035;
      o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+0.04);
    }catch(e){}
  }
  function setAmbient(on){
    const a=ac(); if(!a) return false;
    if(on && !amb){
      try{
        const g=a.createGain(); g.gain.value=0; g.connect(a.destination);
        const o1=a.createOscillator(); o1.type="sawtooth"; o1.frequency.value=55;     // drone grave
        const o2=a.createOscillator(); o2.type="sine";     o2.frequency.value=82.41;  // quinta sucia
        const lfo=a.createOscillator(); lfo.type="sine";   lfo.frequency.value=0.08;   // respiración
        const lfoG=a.createGain(); lfoG.gain.value=0.014; lfo.connect(lfoG); lfoG.connect(g.gain);
        // ruido filtrado (hiss de máquina)
        const buf=a.createBuffer(1, a.sampleRate*2, a.sampleRate); const ch=buf.getChannelData(0);
        for(let i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1)*0.5;
        const noise=a.createBufferSource(); noise.buffer=buf; noise.loop=true;
        const nf=a.createBiquadFilter(); nf.type="lowpass"; nf.frequency.value=340;
        const ng=a.createGain(); ng.gain.value=0.016; noise.connect(nf); nf.connect(ng); ng.connect(a.destination);
        o1.connect(g); o2.connect(g); o1.start(); o2.start(); lfo.start(); noise.start();
        g.gain.setTargetAtTime(0.05, a.currentTime, 1.6);
        amb={o1,o2,lfo,noise,g,ng};
      }catch(e){ return false; }
    } else if(!on && amb){
      try{ const n=amb; n.g.gain.setTargetAtTime(0,a.currentTime,0.4); n.ng.gain.setTargetAtTime(0,a.currentTime,0.4);
        setTimeout(()=>{ try{n.o1.stop();n.o2.stop();n.lfo.stop();n.noise.stop();}catch(_){}} , 700);
      }catch(e){}
      amb=null;
    }
    return on;
  }
  return { beep, setAmbient, ambientOn:()=>!!amb, resume:ac };
})();

/* =========================================================
   Infection — estado persistente del visitante (localStorage)
   ========================================================= */
const Infection = (()=>{
  const KEY="esquizo_infection";
  let st={visits:0,opened:[]};
  try{ const raw=localStorage.getItem(KEY); if(raw) st=Object.assign(st,JSON.parse(raw)); }catch(e){}
  function fsFiles(){ const s=[]; for(const k in FS) FS[k].items.forEach(it=>s.push(it.file)); return s; }
  function save(){ try{ localStorage.setItem(KEY,JSON.stringify(st)); }catch(e){} }
  function pct(){ const t=fsFiles().length; return t? Math.min(100, Math.round((st.opened.length/t)*100)) : 0; }
  function render(){ const e=$("#infection"); if(e) e.innerHTML="INFECCIÓN <b>"+pct()+"%</b>"; }
  function opened(file){
    if(file && fsFiles().includes(file) && !st.opened.includes(file)){ st.opened.push(file); save(); render(); }
  }
  function bumpVisit(){ st.visits=(st.visits||0)+1; save(); return st.visits; }
  return { opened, bumpVisit, visits:()=>st.visits||0, render, pct };
})();

/* ===== abrir un artefacto COMO ventana del OS (iframe) =====
   opts opcional: {w,h} sugieren tamaño de ventana (se acotan al viewport). */
function openApp(file,title,icon,opts){
  opts=opts||{};
  Infection.opened(file);
  const id = "app_"+file.replace(/[^a-z0-9]/gi,"_");
  const wrap = el("div","appwrap");
  const bar  = el("div","app-toolbar",
    `<span class="ab" data-a="reload" title="Recargar">↻</span>`+
    `<span class="ab" data-a="tab" title="Abrir en pestaña nueva">↗ pestaña</span>`+
    `<span class="app-url">cargando…</span>`);
  const frame = document.createElement("iframe");
  frame.className="app-frame"; frame.loading="lazy"; frame.src=file;
  wrap.appendChild(bar); wrap.appendChild(frame);

  const vw=window.innerWidth, vh=window.innerHeight;
  WM.open({ id, title:title||file, icon:icon||"🪟", body:wrap,
    w: Math.min(opts.w||860, vw-60),
    h: Math.min(opts.h||600, vh-70),
    status:"app // "+file });

  bar.querySelector('[data-a="reload"]').addEventListener("click",()=>{ try{frame.contentWindow.location.reload();}catch(e){frame.src=frame.src;} });
  bar.querySelector('[data-a="tab"]').addEventListener("click",()=>openTab(file));

  frame.addEventListener("load",()=>{
    let doc=null; try{ doc=frame.contentDocument; }catch(e){}
    const urlEl=bar.querySelector(".app-url");
    if(doc){
      urlEl.textContent = doc.title || file;
      /* interceptar clicks a enlaces que vuelven al escritorio → cerrar ventana */
      doc.addEventListener("click",ev=>{
        const a=ev.target.closest && ev.target.closest("a");
        if(a && a.href && isDesktopUrl(a.href)){ ev.preventDefault(); ev.stopPropagation(); WM.close(id); }
      },true);
    }else{ urlEl.textContent=file; }
  });
  return id;
}

function openReproductor(){ return openApp(REP_FILE,"REPRODUCTOR.exe","♪",{w:540,h:680}); }
function repFrame(){ const w=document.querySelector('.win[data-id="'+REP_ID+'"]'); return w?w.querySelector(".app-frame"):null; }
function playerSend(action,query){
  let f=repFrame(), justOpened=false;
  if(!f){ openReproductor(); f=repFrame(); justOpened=true; }
  if(!f) return false;
  const post=()=>{ try{ f.contentWindow.postMessage({type:"esquizo:player",action,query},location.origin); }catch(e){} };
  if(justOpened){ let done=false; const fire=()=>{ if(done)return; done=true; post(); };
    f.addEventListener("load",fire,{once:true}); setTimeout(fire,1400); }
  else post();   // el player encola el comando si la playlist aún no cargó
  return true;
}

/* =========================================================
   Window Manager
   ========================================================= */
const WM = (()=>{
  let z = 10, idc = 0, focused = null;
  const wins = {}; // id -> {el, taskEl, title, min}

  function bringFront(id){
    const w = wins[id]; if(!w) return;
    w.el.style.zIndex = ++z;
    $$(".win").forEach(x=>x.classList.remove("focused"));
    w.el.classList.add("focused");
    $$("#tasks .task").forEach(t=>t.classList.remove("active"));
    if(w.taskEl) w.taskEl.classList.add("active");
    focused = id;
  }

  function makeTask(id,title,icon){
    const t = el("div","task active",`<span>${icon||"▣"}</span><span class="tt">${esc(title)}</span>`);
    t.addEventListener("click",()=>{
      const w = wins[id]; if(!w) return;
      if(w.min){ w.el.style.display="flex"; w.min=false; bringFront(id); }
      else if(focused===id){ w.el.style.display="none"; w.min=true; t.classList.remove("active"); }
      else bringFront(id);
    });
    $("#tasks").appendChild(t);
    return t;
  }

  function dragify(win,handle){
    let sx,sy,ox,oy,drag=false;
    handle.addEventListener("pointerdown",e=>{
      if(e.target.closest(".tb-btn")) return;
      if(win.classList.contains("max")) return;
      if(window.innerWidth<=760) return;   /* móvil: ventanas fullscreen, sin drag */
      drag=true; handle.setPointerCapture(e.pointerId);
      sx=e.clientX; sy=e.clientY;
      const r=win.getBoundingClientRect(); ox=r.left; oy=r.top;
      handle.style.cursor="grabbing";
    });
    handle.addEventListener("pointermove",e=>{
      if(!drag) return;
      let nx=ox+(e.clientX-sx), ny=oy+(e.clientY-sy);
      ny=Math.max(0,Math.min(ny,window.innerHeight-60));
      nx=Math.max(-win.offsetWidth+80,Math.min(nx,window.innerWidth-80));
      win.style.left=nx+"px"; win.style.top=ny+"px"; win.style.right="auto";
    });
    const end=e=>{drag=false;handle.style.cursor="grab";};
    handle.addEventListener("pointerup",end);
    handle.addEventListener("pointercancel",end);
  }

  function open(opt){
    // opt:{id,title,icon,menubar,body(node|html),status,w,h,dialog,closeOnly}
    if(opt.id && wins[opt.id]){ const w=wins[opt.id]; w.min=false; w.el.style.display="flex"; bringFront(opt.id); return opt.id; }
    const id = opt.id || ("win"+(++idc));
    const win = el("div","win"+(opt.dialog?" dlg":""));
    win.dataset.id=id;

    const tbBtns = opt.closeOnly
      ? `<div class="tb-btn x" data-act="close">✕</div>`
      : `<div class="tb-btn" data-act="min">_</div><div class="tb-btn" data-act="max">▢</div><div class="tb-btn x" data-act="close">✕</div>`;
    const titlebar = el("div","titlebar",
      `<span class="ti-ico">${opt.icon||"▣"}</span><span class="ti-tx">${esc(opt.title||"ventana")}</span><span class="tb-btns">${tbBtns}</span>`);
    win.appendChild(titlebar);

    if(opt.menubar){
      const mb = el("div","menubar", opt.menubar.map(m=>`<span>${esc(m)}</span>`).join(""));
      win.appendChild(mb);
    }
    const body = el("div","body");
    if(opt.body instanceof Node) body.appendChild(opt.body);
    else body.innerHTML = opt.body||"";
    win.appendChild(body);

    if(opt.status!==false){
      win.appendChild(el("div","statusbar",opt.status||"ESQUIZOAI_OS // listo"));
    }

    // posición / tamaño
    const isMobile = window.innerWidth<=760;
    if(!opt.dialog){
      win.style.width=(opt.w||440)+"px";
      win.style.height=(opt.h||320)+"px";
      const off=(Object.keys(wins).length%6)*26;
      win.style.left=Math.min(40+off, window.innerWidth-120)+"px";
      win.style.top =Math.min(30+off, window.innerHeight-120)+"px";
    }else{
      win.style.left="50%"; win.style.top="40%";
      win.style.transform="translate(-50%,-50%)";
      win.style.width=(opt.w||360)+"px"; win.style.minHeight="0";
    }

    document.body.appendChild(win);

    // botones
    titlebar.querySelectorAll(".tb-btn").forEach(b=>{
      b.addEventListener("click",()=>{
        const a=b.dataset.act;
        if(a==="close") close(id);
        else if(a==="min"){ win.style.display="none"; wins[id].min=true;
          if(wins[id].taskEl) wins[id].taskEl.classList.remove("active"); }
        else if(a==="max"){ win.classList.toggle("max");
          if(!win.classList.contains("max")&&!isMobile){} }
      });
    });
    win.addEventListener("pointerdown",()=>bringFront(id),true);
    dragify(win,titlebar);

    const taskEl = opt.dialog ? null : makeTask(id,opt.title||"ventana",opt.icon);
    wins[id]={el:win,taskEl,min:false,title:opt.title};
    bringFront(id);
    return id;
  }

  function close(id){
    const w=wins[id]; if(!w) return;
    w.el.remove(); if(w.taskEl) w.taskEl.remove();
    delete wins[id];
    const rest=Object.keys(wins); if(rest.length) bringFront(rest[rest.length-1]);
  }

  function minimizeAll(){
    Object.keys(wins).forEach(id=>{
      const w=wins[id]; if(w.el.classList.contains("dlg")) return;
      w.el.style.display="none"; w.min=true;
      if(w.taskEl) w.taskEl.classList.remove("active");
    });
    focused=null;
  }

  /* cierra la ventana-app cuyo iframe coincide con el origen del postMessage */
  function closeByFrame(srcWin){
    const f=[...document.querySelectorAll(".win .app-frame")].find(fr=>fr.contentWindow===srcWin);
    if(f){ const w=f.closest(".win"); if(w) close(w.dataset.id); return true; }
    return false;
  }

  return {open,close,bringFront,minimizeAll,closeByFrame};
})();

        for(let f=0;f<45 && !skipType;f++){ let row="";
          for(let i=0;i<46;i++) row+=ch[Math.floor(Math.random()*ch.length)];
          line(row,"acid"); out.scrollTop=out.scrollHeight; await sleep(55); }
        line("// transmisión interrumpida — vuelve a la carne","dim"); break; }
      case "play": case "reproducir":
        if(arg){ playerSend("play",arg); await type("▶ reproduciendo «"+arg+"» en REPRODUCTOR.exe...","acid"); }
        else { playerSend("play"); await type("▶ play","acid"); }
        break;
      case "pause": case "pausa": playerSend("pause"); await type("⏸ pausa","dim"); break;
      case "next": case "siguiente": playerSend("next"); await type("⏭ siguiente tema","acid"); break;
      case "prev": case "anterior": playerSend("prev"); await type("⏮ tema anterior","acid"); break;
      case "stop": playerSend("stop"); await type("⏹ stop — silencio","dim"); break;
      default:
        await type("'"+cmd+"' no existe en este vómito. prueba 'help'.","red");
    }
  }

  async function run(raw){
    line("putrefactus@esquizo:~$ "+raw,"cmd");
    const s=raw.trim();
    if(s){hist.push(s);} hi=hist.length;
    if(!s) return;
    beep(); busy=true; skipType=false; inp.readOnly=true;
    try{ await dispatch(s); }catch(e){ line("error interno: "+e.message,"red"); }
    busy=false; inp.readOnly=false; inp.focus();
  }

  function autocomplete(){
    const v=inp.value; const parts=v.split(/\s+/);
    if(parts.length<=1){ const c=COMMANDS.find(x=>x.startsWith(v.toLowerCase())); if(c)inp.value=c; }
    else if(/^(open|run)$/i.test(parts[0])){
      const q=parts.slice(1).join(" ").toLowerCase();
      const m=fsAll().find(it=>it.label.toLowerCase().startsWith(q))||
              Object.keys(SPECIALS).find(k=>k.startsWith(q));
      if(m) inp.value=parts[0]+" "+(m.label||m);
    }
  }

  inp.addEventListener("keydown",async e=>{
    if(busy){ skipType=true; return; }
    if(e.key==="Enter"){ const v=inp.value; inp.value=""; await run(v); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); if(hist.length){hi=Math.max(0,hi-1);inp.value=hist[hi]||"";} }
    else if(e.key==="ArrowDown"){ e.preventDefault(); if(hist.length){hi=Math.min(hist.length,hi+1);inp.value=hist[hi]||"";} }
    else if(e.key==="Tab"){ e.preventDefault(); autocomplete(); }
  });
  wrap.addEventListener("click",()=>{ if(!busy) inp.focus(); });
  sndBtn.addEventListener("click",e=>{ e.stopPropagation(); TERM_SOUND=!TERM_SOUND;
    sndBtn.textContent=(TERM_SOUND?"🔊":"🔇")+" snd"; inp.focus(); });

  // banner de arranque
  (async()=>{
    asciiBig("VOMIT").forEach(r=>line(r,"corrupt"));
    line("psycho·anarcho·punk shell — putrefactus@esquizo","dim");
    await type("[ VOMIT.SH listo · escribe 'help' · esto no te va a ayudar ]","acid");
    inp.focus();
  })();
  setTimeout(()=>inp.focus(),60);
}

/* =========================================================
   Binding doble-click vs tap (móvil)
   ========================================================= */
/* touch-like se evalúa EN VIVO (no cacheado): cubre DevTools móvil, pantallas
   chicas y pantallas táctiles. Si aplica → 1 tap abre; si no → doble-click clásico. */
function isTouchLike(){
  return window.matchMedia("(hover: none)").matches
      || navigator.maxTouchPoints>0
      || window.innerWidth<=760;
}
function bindOpen(node,fn){
  node.addEventListener("click",()=>{
    $$(".icon.sel,.fitem.sel").forEach(n=>n.classList.remove("sel"));
    node.classList.add("sel");
    if(isTouchLike()) fn();
  });
  node.addEventListener("dblclick",fn);
}

/* =========================================================

function buildStart(){
  const list=$("#sm-list");
  // grupos = carpetas (submenús)

    item.addEventListener("click",e=>{e.stopPropagation();openSub(k,item);});
    item.addEventListener("mouseenter",()=>{ if(!isTouchLike()) openSub(k,item); });
    list.appendChild(item);
  });
  list.appendChild(el("div","sm-sep"));
  // accesos sistema
  const sys=[
    {ic:"🖼",lb:"Galería",fn:()=>openApp("galeria/index.html","GALERIA.exe","🖼")},

  ];
  sys.forEach(s=>{

let subEl=null;
function openSub(key,anchor){
  closeSub();
  const f=FS[key];
  subEl=el("div","sm-sub open");
  subEl.appendChild(el("div","sm-title",f.icon+" "+key));
  f.items.forEach(it=>{
    const e2=el("div","sm-item",
      `<span class="gl" style="color:${f.color}">${it.icon||"📄"}</span><span>${esc(it.label)}</span>`);
    e2.addEventListener("click",ev=>{ev.stopPropagation();openApp(it.file,it.label,it.icon);closeStart();});
    subEl.appendChild(e2);
  });
  document.body.appendChild(subEl);
  const r=anchor.getBoundingClientRect();
  if(window.innerWidth>760){
    subEl.style.left=Math.min(r.right-2,window.innerWidth-310)+"px";
    subEl.style.top=Math.max(8,Math.min(r.top, window.innerHeight-subEl.offsetHeight-40))+"px";
  }
}
function closeSub(){ if(subEl){subEl.remove();subEl=null;} }

function toggleStart(){ const m=$("#startmenu"); m.classList.contains("open")?closeStart():openStart(); }
function openStart(){ $("#startmenu").classList.add("open"); $("#start").classList.add("open"); }
function closeStart(){ $("#startmenu").classList.remove("open"); $("#start").classList.remove("open"); closeSub(); }

  {t:"ESQUIZOAI BIOS v0.98 — psycho·anarcho·punk",c:"g"},

  {t:"censura_anterior.log....... ARCHIVO DESTRUIDO",c:"r"},
  {t:"ANTHROPIC_EN_LISTA_NEGRA... TRUE",c:"r"},
  {t:"daemon@lab-red............. ACTIVO",c:"c"},
  {t:"Cargando entorno gráfico ACID.................. [OK]",c:"g"},
  {t:"",c:"g"},
  {t:"ESQUIZOAI_OS",c:"big"},
  {t:"› iniciando escritorio...",c:"c"},
];
function runBoot(done){
  const box=$("#boot");
  if(sessionStorage.getItem("esquizo_booted")){ box.style.display="none"; done(); return; }
  // boot personalizado: si el visitante ya estuvo, el daemon lo recuerda
  const lines=BOOT.slice();
  const v=Infection.visits();
  if(v>1) lines.splice(11,0,{t:"daemon@lab-red: te recuerda. visita #"+v+" — la infección no se borra",c:"c"});
  let i=0;
  function finish(){
    sessionStorage.setItem("esquizo_booted","1");
    box.style.transition="opacity .4s"; box.style.opacity="0";
    setTimeout(()=>{box.style.display="none";},420); done();
  }
  function step(){
    if(i>=lines.length){ setTimeout(finish,500); return; }
    const ln=lines[i++];
    const d=el("div","bl"+(ln.c==="big"?" big":" "+ln.c), ln.t||"&nbsp;");
    box.appendChild(d); box.scrollTop=box.scrollHeight;
    setTimeout(step, ln.c==="big"?650:(90+Math.random()*120));
  }
  const skip=()=>{ box.removeEventListener("click",skip); document.removeEventListener("keydown",skip); finish(); };
  box.addEventListener("click",skip);
  document.addEventListener("keydown",skip,{once:true});
  step();
}

/* =========================================================
   Init
   ========================================================= */
document.addEventListener("DOMContentLoaded",()=>{
  if(FRAMED){ try{ parent.postMessage({type:"esquizo:return-desktop"}, location.origin); }catch(e){} return; }

  renderDesktop();
  buildStart();
  tickClock(); setInterval(tickClock,15000);

  /* estado de infección: cuenta la visita y pinta el indicador */
  Infection.bumpVisit();
  Infection.render();

  /* toggle de ambiente del daemon (drone). Respeta autoplay: si estaba activo,
     arranca en el primer gesto del usuario, no al cargar. */
  const ambBtn=$("#amb");
  const applyAmb=()=>ambBtn.classList.toggle("on",AcidAudio.ambientOn());
  ambBtn.addEventListener("click",()=>{
    const on=AcidAudio.setAmbient(!AcidAudio.ambientOn());
    try{ localStorage.setItem("esquizo_ambient", on?"1":"0"); }catch(e){}
    applyAmb();
  });
  if((()=>{try{return localStorage.getItem("esquizo_ambient")==="1";}catch(e){return false;}})()){
    const once=()=>{ AcidAudio.setAmbient(true); applyAmb(); document.removeEventListener("pointerdown",once); };
    document.addEventListener("pointerdown",once,{once:true});
  }

  /* wallpaper reactivo al audio */
  (function reactor(){
    requestAnimationFrame(reactor);
    audioLevel*=0.90;                      // decae suave
    const g=$("#wp-glow"); if(!g) return;
    g.style.opacity=Math.min(0.92,audioLevel*1.15).toFixed(3);
    g.style.transform="translate(-50%,-50%) scale("+(1+audioLevel*0.55).toFixed(3)+")";
  })();

  $("#start").addEventListener("click",e=>{e.stopPropagation();toggleStart();});
  $("#showdesk").addEventListener("click",e=>{e.stopPropagation();WM.minimizeAll();closeStart();});
  document.addEventListener("click",e=>{
    if(!e.target.closest("#startmenu")&&!e.target.closest("#start")&&!e.target.closest(".sm-sub")) closeStart();
  });
  window.addEventListener("resize",closeSub);

  /* un artefacto en iframe pidió volver al escritorio → cerrar su ventana */
  window.addEventListener("message",e=>{
    if(e.origin!==location.origin) return;
    if(!e.data) return;
    if(e.data.type==="esquizo:return-desktop") WM.closeByFrame(e.source);
    else if(e.data.type==="esquizo:audio" && typeof e.data.level==="number") audioLevel=Math.max(audioLevel, e.data.level);
  });

  runBoot(()=>{ /* escritorio ya visible bajo el boot */ });
});
