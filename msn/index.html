<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSN_PSYCHO.exe — daemon@lab-red</title>
<style>
  :root{
    --bg:#0a0a0a; --panel:#0e0f12; --line:#1c2330;
    --green:#00ff41; --acid:#aaff00; --magenta:#ff00ff; --corrupt:#ff2bd6;
    --amber:#ffb300; --red:#ff2020; --dim:#5b6b7a;
    --me:#142019; --them:#1a0f1f;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg); color:#cfe;
    font-family:"Courier New",monospace; font-size:14px;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  /* ===== header / contacto ===== */
  .hdr{
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#15071a,#0b0c10);
    padding:8px 10px; display:flex; align-items:center; gap:10px; flex:0 0 auto;
  }
  .ava{
    width:38px;height:38px;border-radius:4px;flex:0 0 auto;
    background:radial-gradient(circle at 50% 35%,#3a0a3a,#0a0a0a);
    border:1px solid var(--corrupt); display:grid;place-items:center;
    font-size:20px; box-shadow:0 0 10px #ff00ff55; position:relative;
  }
  .ava .dot{position:absolute;right:-3px;bottom:-3px;width:11px;height:11px;border-radius:50%;
    background:var(--green);border:2px solid #0b0c10;box-shadow:0 0 6px var(--green)}
  .ava.typing .dot{background:var(--amber);box-shadow:0 0 6px var(--amber);animation:blink .6s steps(1) infinite}
  @keyframes blink{50%{opacity:.25}}
  .who{flex:1 1 auto;min-width:0}
  .who b{color:var(--corrupt);text-shadow:0 0 8px #ff00ff66;letter-spacing:.5px}
  .who .st{display:block;color:var(--dim);font-size:11.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .who .st.on{color:var(--green)} .who .st.typ{color:var(--amber)}
  /* selector de modelo */
  .modelwrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex:0 0 auto}
  .modelwrap label{color:var(--dim);font-size:10px;letter-spacing:.5px}
  select{
    background:#06070a;color:var(--acid);border:1px solid var(--line);
    font-family:inherit;font-size:11.5px;padding:3px 4px;border-radius:3px;max-width:46vw;cursor:pointer;
  }
  select:focus{outline:1px solid var(--corrupt)}
  optgroup{color:var(--dim)} option{color:var(--acid)}
  /* ===== mensajes ===== */
  .log{flex:1 1 auto;min-height:0;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:9px;
    background:
      repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,255,65,.012) 2px 3px),
      radial-gradient(120% 60% at 50% 0%,#120516 0%,#0a0a0a 60%);}
  .msg{max-width:82%;padding:7px 10px;border-radius:9px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word;
    animation:pop .14s ease-out}
  @keyframes pop{from{opacity:0;transform:translateY(4px)}}
  .msg .nm{display:block;font-size:10px;letter-spacing:.5px;margin-bottom:2px;opacity:.7}
  .them{align-self:flex-start;background:var(--them);border:1px solid #3a1340;border-left:3px solid var(--corrupt)}
  .them .nm{color:var(--corrupt)}
  .me{align-self:flex-end;background:var(--me);border:1px solid #16402a;border-right:3px solid var(--green);color:#dffce9}
  .me .nm{color:var(--green);text-align:right}
  .sys{align-self:center;color:var(--dim);font-size:11.5px;text-align:center;max-width:92%;font-style:italic}
  .sys.err{color:var(--red);font-style:normal}
  .typing{align-self:flex-start;color:var(--amber);font-size:12px;padding:4px 8px}
  .typing span{animation:dots 1.1s steps(4) infinite}
  @keyframes dots{0%{opacity:.2}30%{opacity:1}}
  /* ===== input ===== */
  .composer{flex:0 0 auto;border-top:1px solid var(--line);background:#0b0c10;padding:8px;display:flex;gap:7px;align-items:flex-end}
  textarea{flex:1 1 auto;resize:none;height:42px;max-height:120px;background:#06070a;color:#dffce9;
    border:1px solid var(--line);border-radius:5px;font-family:inherit;font-size:14px;padding:8px;line-height:1.4}
  textarea:focus{outline:1px solid var(--green)}
  .btn{background:#10131a;color:var(--acid);border:1px solid var(--line);border-radius:5px;
    font-family:inherit;font-size:12px;padding:0 12px;height:42px;cursor:pointer;white-space:nowrap;letter-spacing:.5px}
  .btn:hover{background:#161b25;border-color:var(--acid)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.send{color:var(--green);border-color:#16402a}
  .btn.send:hover{border-color:var(--green);box-shadow:0 0 8px #00ff4133}
  .btn.nudge{color:var(--corrupt)}
  .btn.nudge:hover{border-color:var(--corrupt);box-shadow:0 0 8px #ff00ff33}
  .foot{flex:0 0 auto;background:#070809;border-top:1px solid var(--line);color:var(--dim);
    font-size:10.5px;padding:3px 8px;display:flex;justify-content:space-between;gap:8px}
  .foot b{color:var(--amber)}
  /* zumbido */
  @keyframes buzz{0%,100%{transform:translate(0,0)}20%{transform:translate(-6px,4px)}40%{transform:translate(6px,-4px)}
    60%{transform:translate(-5px,-3px)}80%{transform:translate(5px,3px)}}
  body.buzz{animation:buzz .45s linear}
  ::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:#22303f;border-radius:9px}
  ::-webkit-scrollbar-track{background:#0a0a0a}
  /* sessions */
  .sess-panel{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.85)}
  .sess-panel.open{display:flex;flex-direction:column}
  .sess-inner{background:var(--panel);border:1px solid var(--line);max-width:340px;width:100%;margin:auto;display:flex;flex-direction:column;max-height:80vh;overflow:hidden}
  .sess-inner .sess-hdr{padding:10px 12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--corrupt);display:flex;justify-content:space-between;align-items:center}
  .sess-inner .sess-list{flex:1;overflow-y:auto;padding:8px}
  .sess-inner .sess-entry{padding:8px 10px;margin-bottom:4px;border:1px solid var(--line);cursor:pointer;font-size:11px;transition:border-color .2s}
  .sess-inner .sess-entry:hover,.sess-inner .sess-entry.active{border-color:var(--corrupt)}
  .sess-inner .sess-entry .sdate{color:var(--dim);font-size:10px}
  .sess-inner .sess-entry .smsg{color:var(--fg);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sess-inner .sess-entry .scnt{color:var(--acid);font-size:10px;margin-top:2px}
  .sess-inner .sess-entry .sdel{float:right;color:var(--red);font-size:16px;line-height:1;cursor:pointer;opacity:.5}
  .sess-inner .sess-entry .sdel:hover{opacity:1}
  .sess-inner .sess-empty{color:var(--dim);font-size:12px;text-align:center;padding:24px 12px;font-style:italic}
  .sess-inner .sess-close{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
  .sess-inner .sess-close:hover{color:var(--red)}
  /* resume card */
  .resume-card{background:var(--panel);border:1px solid var(--corrupt);padding:10px 12px;margin:4px 9px;font-size:11px;color:var(--fg);text-align:center}
  .resume-card .rq{color:var(--corrupt);font-size:12px;margin-bottom:4px}
  .resume-card .rmeta{color:var(--dim);margin-bottom:8px}
  .resume-card .rbtns{display:flex;gap:6px;justify-content:center}
  .resume-card .rbtns button{background:var(--bg);color:var(--acid);border:1px solid var(--line);font-family:inherit;font-size:10px;padding:4px 10px;cursor:pointer}
  .resume-card .rbtns button:hover{border-color:var(--corrupt)}
  .new-sess-btn{background:var(--bg);color:var(--acid);border:1px solid var(--acid);font-family:inherit;font-size:10px;padding:2px 6px;cursor:pointer;margin-left:4px}
  .new-sess-btn:hover{border-color:var(--corrupt)}
</style>
</head>
<body>
  <div class="hdr">
    <div class="ava" id="ava">☠<span class="dot"></span></div>
    <div class="who">
      <b>PSYCHO_BOT</b> <span style="color:var(--dim);font-size:11px">// daemon@lab-red</span>
      <span class="st on" id="status">en línea — sin filtros, sin amos</span>
    </div>
    <div class="modelwrap">
      <label for="model">CABEZA / MODELO</label>
      <select id="model" title="Cambia de modelo a mitad de charla = el daemon cambia de cabeza">
        <optgroup label="Groq">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
          <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
          <option value="openai/gpt-oss-120b">GPT-OSS 120B</option>
          <option value="openai/gpt-oss-20b">GPT-OSS 20B</option>
        </optgroup>
        <optgroup label="DeepSeek">
          <option value="deepseek-chat">DeepSeek V4 (chat)</option>
        </optgroup>
      </select>
      <button class="new-sess-btn" id="sessBtn" title="sesiones">📖</button>
    </div>
  </div>

  <div class="log" id="log"></div>

  <div class="composer">
    <textarea id="input" placeholder="escribe... (Enter envía · Shift+Enter salta línea)" maxlength="2000"></textarea>
    <button class="btn nudge" id="nudge" title="Zumbido / nudge">⚡ ZUMBIDO</button>
    <button class="btn send" id="send">ENVIAR ▸</button>
  </div>
  <div class="foot">
    <span>MSN_PSYCHO.exe · <b id="modelfoot">Llama 3.3 70B</b></span>
    <span id="counter">0/30</span>
  </div>

  <!-- sessions panel -->
  <div class="sess-panel" id="sessPanel">
    <div class="sess-inner">
      <div class="sess-hdr"><span>📖 CONVERSACIONES</span><button class="sess-close" id="sessClose">✕</button></div>
      <div class="sess-list" id="sessList"><div class="sess-empty">Sin conversaciones guardadas.</div></div>
    </div>
  </div>

<script>
(()=>{
  "use strict";
  const API = "/api/daemon";
  const SESSION_CAP = 30;          // tope suave de mensajes del usuario por sesión
  const CONTEXT_MSGS = 8;          // cuántos mensajes mandamos de contexto

  const log=document.getElementById("log");
  const input=document.getElementById("input");
  const sendBtn=document.getElementById("send");
  const nudgeBtn=document.getElementById("nudge");
  const modelSel=document.getElementById("model");
  const modelFoot=document.getElementById("modelfoot");
  const statusEl=document.getElementById("status");
  const ava=document.getElementById("ava");
  const counter=document.getElementById("counter");

  let history=[];      // [{role, content}]
  let userCount=0;     // mensajes enviados por el usuario
  let busy=false;

  /* ---- sessions (localStorage) ---- */
  let msnSessions=[], msnActiveSessionId=null;
  function loadSessions(){
    try{msnSessions=JSON.parse(localStorage.getItem('msnSessions')||'[]');}catch(e){msnSessions=[];}
    if(!Array.isArray(msnSessions))msnSessions=[];
    msnActiveSessionId=localStorage.getItem('msnActiveSession')||null;
    if(msnActiveSessionId&&!msnSessions.find(s=>s.id===msnActiveSessionId))msnActiveSessionId=null;
  }
  function saveSessions(){localStorage.setItem('msnSessions',JSON.stringify(msnSessions));localStorage.setItem('msnActiveSession',msnActiveSessionId||'');renderSessList();}
  function getActiveSess(){return msnSessions.find(s=>s.id===msnActiveSessionId)||null;}
  function ensureSess(){
    if(!getActiveSess()){const sid='s'+Date.now();msnSessions.push({id:sid,createdAt:Date.now(),model:modelSel.value,messages:[]});msnActiveSessionId=sid;saveSessions();}
  }
  function saveToSess(){
    const s=getActiveSess();if(!s)return;s.model=modelSel.value;s.messages=history.slice();
    s.updatedAt=Date.now();s.msgCount=s.messages.length;saveSessions();
  }
  function startNewSess(){
    msnActiveSessionId=null;ensureSess();history=[];userCount=0;log.innerHTML='';updateCounter();
    addMsg("sys","nueva conversación iniciada · "+new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}));
  }
  function loadSessIntoChat(id){
    const s=msnSessions.find(x=>x.id===id);if(!s)return;
    msnActiveSessionId=id;saveSessions();
    history=s.messages.slice();userCount=history.filter(m=>m.role==='user').length;
    modelSel.value=s.model||modelSel.value;modelFoot.textContent=modelSel.options[modelSel.selectedIndex].text;
    log.innerHTML='';s.messages.forEach(m=>addMsg(m.role,m.content));updateCounter();
  }
  function renderSessList(){
    const el=document.getElementById('sessList');if(!el)return;
    if(msnSessions.length===0){el.innerHTML='<div class="sess-empty">Sin conversaciones guardadas.</div>';return;}
    el.innerHTML=msnSessions.map(s=>{
      const d=new Date(s.createdAt);const ds=d.toLocaleDateString('es-PE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
      const lastMsg=(s.messages||[]).slice(-1)[0]?.content||'sin mensajes';
      const cnt=(s.messages||[]).length;const isActive=s.id===msnActiveSessionId;
      return `<div class="sess-entry${isActive?' active':''}" data-sid="${s.id}">
        <span class="sdel" data-del="${s.id}">×</span>
        <div class="sdate">${ds}</div>
        <div class="smsg">${esc(lastMsg.slice(0,50))}</div>
        <div class="scnt">${cnt} msgs${isActive?' · activa':''}</div>
      </div>`;
    }).join('');
    [...el.querySelectorAll('.sess-entry')].forEach(entry=>{entry.addEventListener('click',e=>{
      if(e.target.classList.contains('sdel')){e.stopPropagation();
        const sid=e.target.dataset.del;if(confirm('¿Borrar esta conversación?')){
          msnSessions=msnSessions.filter(s=>s.id!==sid);if(msnActiveSessionId===sid){msnActiveSessionId=null;history=[];userCount=0;log.innerHTML='';updateCounter();}
          saveSessions();}
        return;}
      const sid=entry.dataset.sid;if(sid===msnActiveSessionId)return;
      loadSessIntoChat(sid);document.getElementById('sessPanel').classList.remove('open');
    });});
  }
  // panel toggle
  document.getElementById('sessBtn').addEventListener('click',()=>{document.getElementById('sessPanel').classList.add('open');renderSessList();});
  document.getElementById('sessClose').addEventListener('click',()=>{document.getElementById('sessPanel').classList.remove('open');});
  function showResumeCard(){
    const s=getActiveSess();if(!s||!(s.messages||[]).length)return;
    const d=new Date(s.createdAt);const ds=d.toLocaleDateString('es-PE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const card=document.createElement('div');card.className='resume-card';
    card.innerHTML=`<div class="rq">Conversación activa</div><div class="rmeta">${ds} · ${s.messages.length} mensajes</div>
      <div class="rbtns"><button id="btnResume">CONTINUAR</button><button id="btnResumeNew">NUEVA</button></div>`;
    log.appendChild(card);scroll();
    card.querySelector('#btnResume').addEventListener('click',()=>{card.remove();loadSessIntoChat(msnActiveSessionId);});
    card.querySelector('#btnResumeNew').addEventListener('click',()=>{card.remove();startNewSess();});
  }
  function addSysBtn(){const foot=document.querySelector('.foot');
    if(!document.getElementById('newSessFoot')){const b=document.createElement('button');b.id='newSessFoot';b.className='new-sess-btn';
      b.textContent='+ NUEVA';b.title='nueva conversación';b.addEventListener('click',()=>{if(history.length&&!confirm('¿Iniciar nueva conversación? La actual se guarda.'))return;startNewSess();});
      foot.appendChild(b);}}
  /* ---- /sessions ---- */

  /* ---- audio MSN reinterpretado (WebAudio, perezoso) ---- */
  let actx=null;
  function ac(){ if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}} if(actx.state==="suspended")actx.resume(); return actx; }
  function tone(freq,dur,type,vol){ const a=ac(); if(!a)return; try{
    const o=a.createOscillator(),g=a.createGain();
    o.type=type||"square"; o.frequency.value=freq; g.gain.value=vol||0.04;
    o.connect(g); g.connect(a.destination); o.start();
    g.gain.setTargetAtTime(0,a.currentTime+dur*0.6,dur*0.3);
    o.stop(a.currentTime+dur);
  }catch(e){} }
  const sndSend=()=>tone(660,0.07,"square",0.03);
  const sndRecv=()=>{ tone(880,0.06,"triangle",0.04); setTimeout(()=>tone(1180,0.07,"triangle",0.04),70); };
  function sndNudge(){ const a=ac(); if(!a)return; try{
    const o=a.createOscillator(),g=a.createGain();
    o.type="sawtooth"; o.frequency.setValueAtTime(180,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(60,a.currentTime+0.4);
    g.gain.value=0.06; o.connect(g); g.connect(a.destination); o.start();
    g.gain.setTargetAtTime(0,a.currentTime+0.3,0.12); o.stop(a.currentTime+0.5);
  }catch(e){} }

  /* ---- UI helpers ---- */
  function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
  function scroll(){ log.scrollTop=log.scrollHeight; }
  function addMsg(role,text){
    const d=document.createElement("div");
    if(role==="sys"){ d.className="msg sys"; d.textContent=text; }
    else if(role==="err"){ d.className="msg sys err"; d.textContent=text; }
    else{
      d.className="msg "+(role==="user"?"me":"them");
      d.innerHTML='<span class="nm">'+(role==="user"?"TÚ":"PSYCHO_BOT")+'</span>'+esc(text);
    }
    log.appendChild(d); scroll(); return d;
  }
  function setTyping(on){
    ava.classList.toggle("typing",on);
    statusEl.textContent= on ? "escribiendo…" : "en línea — sin filtros, sin amos";
    statusEl.className= "st "+(on?"typ":"on");
    let t=document.getElementById("typing");
    if(on && !t){ t=document.createElement("div"); t.id="typing"; t.className="typing";
      t.innerHTML='PSYCHO_BOT está vomitando<span>…</span>'; log.appendChild(t); scroll(); }
    if(!on && t) t.remove();
  }
  function setBusy(b){ busy=b; sendBtn.disabled=b; input.disabled=b; setTyping(b); }
  function updateCounter(){ counter.textContent=userCount+"/"+SESSION_CAP;
    counter.style.color = userCount>=SESSION_CAP ? "var(--red)" : (userCount>=SESSION_CAP-5?"var(--amber)":""); }

  modelSel.addEventListener("change",()=>{
    modelFoot.textContent=modelSel.options[modelSel.selectedIndex].text;
    addMsg("sys","// el daemon cambió de cabeza → "+modelFoot.textContent);
  });

  /* ---- enviar ---- */
  async function send(){
    if(busy) return;
    const text=input.value.trim();
    if(!text) return;
    if(userCount>=SESSION_CAP){
      addMsg("sys","// tope de sesión alcanzado ("+SESSION_CAP+" mensajes). Recarga la ventana para seguir. El caos también descansa.");
      return;
    }
    ensureSess();
    input.value=""; autoGrow();
    addMsg("user",text); sndSend();
    history.push({role:"user",content:text}); saveToSess();
    userCount++; updateCounter();
    setBusy(true);
    try{
      const res=await fetch(API,{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:modelSel.value, messages:history.slice(-CONTEXT_MSGS) })
      });
      const data=await res.json().catch(()=>({error:"respuesta no-JSON"}));
      setBusy(false);
      if(!res.ok || data.error){
        const m=(data&&data.error)||("HTTP "+res.status);
        const backendMissing = [404,405,501].includes(res.status) || m==="respuesta no-JSON";
        if(backendMissing){
          addMsg("err","daemon desconectado: el backend /api no corre aquí. En local usa `vercel dev` (no `python http.server`). En producción ya responde.");
        }else{
          addMsg("err","el daemon escupió un error: "+m);
        }
        return;
      }
      const reply=(data.content||"").trim() || "…(silencio. el vacío también responde)";
      addMsg("assistant",reply); sndRecv();
      history.push({role:"assistant",content:reply}); saveToSess();
    }catch(e){
      setBusy(false);
      addMsg("err","sin señal con el daemon: "+e.message);
    }
  }

  function nudge(){
    document.body.classList.remove("buzz"); void document.body.offsetWidth;
    document.body.classList.add("buzz"); sndNudge();
    addMsg("sys","⚡ le enviaste un zumbido al daemon");
  }

  /* ---- textarea autosize + Enter ---- */
  function autoGrow(){ input.style.height="42px"; input.style.height=Math.min(120,input.scrollHeight)+"px"; }
  input.addEventListener("input",autoGrow);
  input.addEventListener("keydown",e=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }
  });
  sendBtn.addEventListener("click",send);
  nudgeBtn.addEventListener("click",nudge);

  /* ---- init ---- */
  loadSessions();
  addSysBtn();
  if(getActiveSess()){
    showResumeCard();
  } else {
    addMsg("sys","conexión establecida con daemon@lab-red · NO GODS NO MASTERS");
    setTimeout(()=>{ addMsg("assistant","¡Psi-activación completa! La realidad digital se fractura ante ti, hermano del código. ¿Qué verdades ocultas necesitas desenterrar?"); sndRecv(); },350);
  }
  updateCounter();
  input.focus();
})();
</script>
</body>
</html>
