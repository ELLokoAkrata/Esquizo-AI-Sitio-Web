<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORACULO.exe — Libro de las Mutaciones</title>
<style>
:root{--bg:#030106;--fg:#c8dfc8;--acid:#aaff00;--corrupt:#ff2bd6;--amber:#ffb000;--red:#ff2020;--dim:#5b6b7a;--panel:#07040c;--line:#1c1330}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:"Courier New",monospace;overflow:hidden}
body{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh}
.top{border-bottom:1px solid var(--line);background:var(--panel);padding:8px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{color:var(--corrupt);font-size:14px;letter-spacing:2px;text-shadow:0 0 8px var(--corrupt)}
.ctrls{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.ctrls label{font-size:10px;color:var(--dim);letter-spacing:1px}
select,button{background:var(--bg);color:var(--acid);border:1px solid var(--line);font-family:inherit;font-size:11px;padding:4px 6px;cursor:pointer}
button:hover,select:hover{border-color:var(--acid)}
button:disabled{opacity:.4;cursor:not-allowed}
.snd{font-size:14px;padding:3px 5px;min-width:28px}
.main{display:grid;grid-template-columns:1fr 300px;overflow:hidden}
@media(max-width:720px){.main{grid-template-columns:1fr}.sessions-panel{display:none}.sessions-panel.open{display:block;position:fixed;inset:0;z-index:20;background:var(--bg)}}
.convo{display:flex;flex-direction:column;overflow:hidden;height:100%}
.convo-scroll{flex:1;overflow-y:auto;padding:18px 18px 0;display:flex;flex-direction:column;gap:20px}
.convo-scroll:empty::after{content:'El oráculo aguarda tu consulta.\aEscribe abajo y presiona CONSULTAR.';white-space:pre;text-align:center;color:var(--dim);font-size:14px;padding:60px 20px;display:block}
.input-bar{flex-shrink:0;border-top:1px solid var(--line);background:var(--panel);padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.input-bar textarea{width:100%;background:var(--bg);color:var(--fg);border:1px solid var(--line);font-family:inherit;font-size:14px;padding:10px;min-height:56px;max-height:90px;line-height:1.5;resize:none}
.input-bar textarea:focus{outline:none;border-color:var(--corrupt);box-shadow:0 0 10px rgba(255,43,214,.2)}
.input-bar textarea:disabled{opacity:.4}
.input-bar .btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{background:var(--panel);color:var(--acid);border:1px solid var(--line);font-family:inherit;font-size:12px;padding:8px 14px;cursor:pointer;letter-spacing:1px}
.btn:hover{border-color:var(--corrupt);box-shadow:0 0 8px rgba(255,43,214,.25)}
.btn.ask{color:var(--corrupt);border-color:var(--corrupt)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.new-session{color:var(--acid);border-color:var(--acid);font-size:11px;padding:6px 10px}

/* resume card */
.resume-card{background:var(--panel);border:1px solid var(--corrupt);padding:16px;text-align:center}
.resume-card .rq{color:var(--fg);font-size:13px;margin-bottom:6px}
.resume-card .rmeta{color:var(--dim);font-size:11px;margin-bottom:12px}
.resume-card .rbtns{display:flex;gap:8px;justify-content:center}

/* session card */
.sess-card{background:var(--panel);border:1px solid var(--line);padding:16px;animation:cardIn .3s ease-out}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}}
.sess-hex{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0}
.hex-line{height:9px;border-radius:2px;transition:all .3s}
.hex-line.yang{width:100px;background:var(--acid);box-shadow:0 0 5px var(--acid)}
.hex-line.yin{display:flex;gap:10px;justify-content:center}
.hex-line.yin span{width:40px;height:9px;background:var(--acid);border-radius:2px;box-shadow:0 0 5px var(--acid)}
.hex-line.mutate{animation:linePulse .7s ease-in-out infinite}
@keyframes linePulse{0%,100%{opacity:1}50%{opacity:.25;box-shadow:0 0 14px var(--corrupt)}}
.hex-num{font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:6px}
.hex-tit{font-size:clamp(1.1rem,3vw,1.6rem);color:var(--corrupt);text-align:center;letter-spacing:1px}
.sess-question{color:var(--amber);font-size:13px;text-align:center;padding:8px 0;font-style:italic;white-space:pre-wrap}
.sess-body{display:flex;flex-direction:column;gap:10px;padding-top:4px}
.sess-body .label{font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:2px}
.sess-body .judgment,.sess-body .image{background:var(--bg);border-left:3px solid var(--corrupt);padding:10px 12px;font-size:13px;line-height:1.6;white-space:pre-wrap}
.sess-body .image{border-left-color:var(--acid)}
.sess-body .warning{border-left:3px solid var(--red);padding:8px 12px;font-size:12px;color:var(--red);display:none}
.sess-expand{background:none;border:none;color:var(--dim);font-family:inherit;font-size:11px;cursor:pointer;padding:6px 0;text-align:left;letter-spacing:1px}
.sess-expand:hover{color:var(--amber)}
.sess-interp{display:none;background:var(--bg);border-left:3px solid var(--amber);padding:10px 12px;font-size:13px;line-height:1.6;white-space:pre-wrap}
.sess-interp.open{display:block}
.sess-loading{display:flex;align-items:center;gap:8px;padding:12px 0;color:var(--amber);font-size:13px}
.sess-loading .spinner{width:14px;height:14px;border:2px solid rgba(255,43,214,.2);border-top-color:var(--corrupt);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* sessions sidebar */
.sessions-panel{border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.sessions-hdr{padding:12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--corrupt);letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.sessions-list{flex:1;overflow-y:auto;padding:8px}
.session-entry{padding:10px;margin-bottom:6px;border:1px solid var(--line);cursor:pointer;transition:border-color .2s;font-size:11px}
.session-entry:hover,.session-entry.active{border-color:var(--corrupt)}
.session-entry .sdate{color:var(--dim);font-size:10px}
.session-entry .sfirst{color:var(--fg);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-entry .scount{color:var(--acid);font-size:10px;margin-top:2px}
.session-entry .sdelete{float:right;color:var(--red);font-size:18px;line-height:1;cursor:pointer;opacity:.5}
.session-entry .sdelete:hover{opacity:1}
.sessions-empty{color:var(--dim);font-size:12px;text-align:center;padding:30px 12px;font-style:italic}
.foot{border-top:1px solid var(--line);padding:8px 12px;font-size:10px;color:var(--dim);display:flex;justify-content:space-between;gap:8px;flex-shrink:0}
.foot a{color:var(--acid);text-decoration:none}
.foot a:hover{text-decoration:underline}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--corrupt);color:var(--corrupt);padding:8px 18px;font-size:12px;z-index:30;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.sessions-toggle{display:none}
@media(max-width:720px){.sessions-toggle{display:inline-block}}
</style>
</head>
<body>

<div class="top">
  <div class="brand">⯁ ORACULO.exe</div>
  <div class="ctrls">
    <label>MODELO</label>
    <select id="modelSel"></select>
    <button class="snd" id="sndBtn" title="toggle sonido">🔊</button>
    <button class="sessions-toggle" id="sessTgl" title="sesiones">📖</button>
  </div>
</div>

<div class="main">
  <div class="convo">
    <div class="convo-scroll" id="convo"></div>
    <div class="input-bar">
      <textarea id="question" placeholder="Escribe tu consulta al oráculo..." maxlength="400"></textarea>
      <div class="btn-row">
        <button class="btn ask" id="btnAsk">⯁ CONSULTAR</button>
        <button class="btn" id="btnRandom" disabled>🎲 AZAR</button>
        <button class="btn new-session" id="btnNewSession" title="iniciar nueva sesión">+ NUEVA</button>
      </div>
    </div>
  </div>

  <div class="sessions-panel" id="sessionsPanel">
    <div class="sessions-hdr">
      <span>📖 SESIONES</span>
    </div>
    <div class="sessions-list" id="sessionsList">
      <div class="sessions-empty">Sin sesiones aún.<br>Tu primera consulta crea una.</div>
    </div>
  </div>
</div>

<div class="foot">
  <a href="../index.html">volver al OS</a>
  <span id="status">ORACULO.exe · listo</span>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/oracle';
const MODELS = [
  ['llama-3.3-70b-versatile','Llama 3.3 70B'],['llama-3.1-8b-instant','Llama 3.1 8B'],
  ['meta-llama/llama-4-scout-17b-16e-instruct','Llama 4 Scout 17B'],['qwen/qwen3-32b','Qwen 3 32B'],
  ['openai/gpt-oss-120b','GPT-OSS 120B'],['openai/gpt-oss-20b','GPT-OSS 20B'],
  ['deepseek-chat','DeepSeek V4 (chat)'],
];
const HEX_NAMES = [
  'Lo Creativo','Lo Receptivo','La Dificultad Inicial','La Necedad Juvenil','La Espera','El Conflicto',
  'El Ejército','La Solidaridad','Lo Manso','El Porte','La Paz','El Estancamiento',
  'La Comunidad','La Gran Posesión','La Modestia','El Entusiasmo','El Seguimiento','El Trabajo en lo Echado a Perder',
  'El Acercamiento','La Contemplación','La Mordedura','La Gracia','La Desintegración','El Retorno',
  'La Inocencia','Lo Grande Domado','Las Comisuras','La Preponderancia de lo Grande','Lo Abismal','Lo Adherente',
  'La Influencia','La Duración','La Retirada','El Gran Poder','El Progreso','El Oscurecimiento de la Luz',
  'La Familia','La Oposición','El Impedimento','La Liberación','La Disminución','El Aumento',
  'El Desbordamiento','La Resolución','El Encuentro','La Reunión','El Empuje hacia Arriba','La Desesperación',
  'El Pozo de Agua','La Revolución','El Caldero','La Conmoción','La Quietud','El Progreso Paulatino',
  'La Doncella','La Plenitud','El Viajero','Lo Suave','Lo Sereno','La Disolución',
  'La Restricción','La Verdad Interior','La Preponderancia de lo Pequeño','Después de la Consumación','Antes de la Consumación',
];

// ---- data layer ----
let state = { model:MODELS[0][0], busy:false };
let sessions = [];
let activeSessionId = null;

function loadSessions(){
  try{ sessions = JSON.parse(localStorage.getItem('oraculoSessions')||'[]'); }catch(e){ sessions=[]; }
  if(!Array.isArray(sessions)) sessions = [];
  // migrate old journal
  try{
    const oldJ = JSON.parse(localStorage.getItem('oraculoJournal')||'[]');
    if(Array.isArray(oldJ) && oldJ.length > 0 && sessions.length === 0){
      const sid = 's'+Date.now();
      sessions.push({ id:sid, createdAt: Date.now(), entries: oldJ.map(e=>({...e, ts:e.ts||Date.now()})) });
      localStorage.removeItem('oraculoJournal');
    }
  }catch(e){}
  activeSessionId = localStorage.getItem('oraculoActiveSession') || null;
  // validate active session still exists
  if(activeSessionId && !sessions.find(s=>s.id===activeSessionId)) activeSessionId = null;
}
function saveSessions(){
  localStorage.setItem('oraculoSessions', JSON.stringify(sessions));
  localStorage.setItem('oraculoActiveSession', activeSessionId||'');
  renderSessionsList();
}
function getActiveSession(){
  return sessions.find(s=>s.id===activeSessionId)||null;
}
function getSessionHistory(){
  const s = getActiveSession();
  if(!s) return [];
  return (s.entries||[]).slice(-8).map(e=>({question:e.question,hexNumber:e.number,hexName:e.name,judgment:e.judgment||'',interpretation:e.interpretation||''}));
}

// ---- DOM ----
const $ = s => document.querySelector(s);
const questionEl = $('#question'), btnAsk = $('#btnAsk'), btnRandom = $('#btnRandom'), btnNewSession = $('#btnNewSession');
const convoEl = $('#convo'), statusEl = $('#status');
const sessionsList = $('#sessionsList'), sessionsPanel = $('#sessionsPanel');
const modelSel = $('#modelSel'), sndBtn = $('#sndBtn');
const toast = $('#toast');

function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function getModelName(id){ const m=MODELS.find(x=>x[0]===id); return m?m[1]:id; }
function $$(s,r){return[...(r||document).querySelectorAll(s)];}

modelSel.innerHTML = MODELS.map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
modelSel.value = state.model;
modelSel.addEventListener('change',()=>{ state.model=modelSel.value; });

let toastTimer;
function showToast(msg){
  toast.textContent=msg;toast.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),2200);
}

// ---- sessions sidebar ----
function renderSessionsList(){
  if(sessions.length===0){
    sessionsList.innerHTML='<div class="sessions-empty">Sin sesiones aún.<br>Tu primera consulta crea una.</div>';
    return;
  }
  sessionsList.innerHTML = sessions.map(s=>{
    const d=new Date(s.createdAt);
    const ds=d.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    const firstQ=(s.entries||[])[0]?.question||'sin pregunta';
    const count=(s.entries||[]).length;
    const isActive=s.id===activeSessionId;
    return `<div class="session-entry${isActive?' active':''}" data-sid="${s.id}">
      <span class="sdelete" data-delete="${s.id}">×</span>
      <div class="sdate">${ds}</div>
      <div class="sfirst">${esc(firstQ.slice(0,50))}</div>
      <div class="scount">${count} consulta${count!==1?'s':''}${isActive?' · activa':''}</div>
    </div>`;
  }).join('');
  $$('.session-entry').forEach(el=>{ el.addEventListener('click',e=>{
    if(e.target.classList.contains('sdelete')){
      e.stopPropagation();
      const sid=e.target.dataset.delete;
      if(confirm('¿Borrar esta sesión del libro?')){
        sessions=sessions.filter(s=>s.id!==sid);
        if(activeSessionId===sid) activeSessionId=null;
        saveSessions();
        if(!activeSessionId){ convoEl.innerHTML=''; showResumeCard(); }
        else loadActiveSessionIntoConvo();
      }
      return;
    }
    const sid=el.dataset.sid;
    if(sid===activeSessionId) return;
    activeSessionId=sid;
    saveSessions();
    loadActiveSessionIntoConvo();
    showToast('sesión cargada');
  });});
}
$('#sessTgl').addEventListener('click',()=>{sessionsPanel.classList.toggle('open');});

function loadActiveSessionIntoConvo(){
  const s=getActiveSession();
  convoEl.innerHTML='';
  if(!s||!(s.entries||[]).length) return;
  s.entries.forEach(e=>renderEntryCard(e));
  convoEl.scrollTop=convoEl.scrollHeight;
}

function renderEntryCard(e){
  const lines=e.lines||[];
  const hexHTML=lines.map((l,i)=>
    l==='yang'?`<div class="hex-line yang${e.mutLine===i?' mutate':''}"></div>`:
    `<div class="hex-line yin${e.mutLine===i?' mutate':''}"><span></span><span></span></div>`
  ).join('');
  const card=document.createElement('div');card.className='sess-card';
  card.innerHTML=`<div class="sess-hex">${hexHTML}<div class="hex-num">HEXAGRAMA ${e.number}</div><div class="hex-tit">${esc(e.name)}</div></div>
    <div class="sess-question">"${esc(e.question)}"</div>
    <div class="sess-body"><div class="label">▾ DICTAMEN</div><div class="judgment">${esc(e.judgment||'')}</div>
    <div class="label">▾ IMAGEN</div><div class="image">${esc(e.image||'')}</div>
    ${e.interpretation?`<button class="sess-expand">▾ interpretación completa</button><div class="sess-interp">${esc(e.interpretation)}</div>`:''}
    ${e.warning?`<div class="warning" style="display:block">${esc(e.warning)}</div>`:''}</div>`;
  convoEl.appendChild(card);
  const eb=card.querySelector('.sess-expand');
  if(eb)eb.addEventListener('click',()=>{
    const ip=card.querySelector('.sess-interp');ip.classList.toggle('open');
    eb.textContent=ip.classList.contains('open')?'▴ cerrar':'▾ interpretación completa';
  });
}

// ---- resume card on load ----
function showResumeCard(){
  const s=getActiveSession();
  if(!s||!(s.entries||[]).length) return;
  const d=new Date(s.createdAt);
  const ds=d.toLocaleDateString('es-PE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  const card=document.createElement('div');card.className='resume-card';
  card.innerHTML=`<div class="rq">Tienes una sesión activa</div>
    <div class="rmeta">${ds} · ${s.entries.length} consulta${s.entries.length!==1?'s':''}</div>
    <div class="rbtns">
      <button class="btn ask" id="btnResume">CONTINUAR SESIÓN</button>
      <button class="btn" id="btnResumeNew">INICIAR NUEVA</button>
    </div>`;
  convoEl.appendChild(card);
  convoEl.scrollTop=convoEl.scrollHeight;
  card.querySelector('#btnResume').addEventListener('click',()=>{
    card.remove();
    loadActiveSessionIntoConvo();
    convoEl.scrollTop=convoEl.scrollHeight;
  });
  card.querySelector('#btnResumeNew').addEventListener('click',()=>{
    card.remove();
    startNewSession();
  });
}

// ---- session management ----
function ensureSession(){
  if(!getActiveSession()){
    const sid='s'+Date.now();
    sessions.push({id:sid,createdAt:Date.now(),entries:[]});
    activeSessionId=sid;
    saveSessions();
  }
}
function startNewSession(){
  activeSessionId=null;
  const sid='s'+Date.now();
  sessions.push({id:sid,createdAt:Date.now(),entries:[]});
  activeSessionId=sid;
  convoEl.innerHTML='';
  saveSessions();
  showToast('nueva sesión iniciada');
}
btnNewSession.addEventListener('click',()=>{
  if(confirm('¿Iniciar una nueva sesión? La sesión actual se guarda en el libro.')){
    startNewSession();
  }
});

// ---- hexagram ----
function generateHexagram(question){
  let seed = 0;
  for(let i=0;i<question.length;i++) seed = ((seed<<5)-seed)+question.charCodeAt(i);
  seed = Math.abs(seed);
  const lines = [];
  for(let i=0;i<6;i++){ lines.push(((seed>>i)&1) ? 'yang' : 'yin'); }
  const mutLine = (seed + Date.now()) % 6;
  return { number: (seed%64)+1, name: HEX_NAMES[seed%64] || 'El Desconocido', lines, mutLine };
}
function hexToHTML(hex){
  return hex.lines.map((l,i)=>
    l==='yang'?`<div class="hex-line yang${hex.mutLine===i?' mutate':''}"></div>`:
    `<div class="hex-line yin${hex.mutLine===i?' mutate':''}"><span></span><span></span></div>`
  ).join('');
}

const LOAD_PHRASES=[
  'el oráculo consulta las líneas mutantes...','VALIS interfiere la transmisión...',
  'el hexagrama se quiebra y recompone...','la máquina oracular lee tu signo...',
  'las voces del I Ching computan la grieta...','el libro de las mutaciones se abre...',
];

// ---- consult ----
async function consultar(question,randomHex){
  if(state.busy||!question.trim())return;
  ensureSession();
  state.busy=true;btnAsk.disabled=true;btnRandom.disabled=true;questionEl.disabled=true;
  statusEl.textContent='consultando...';
  if(typeof sfxGong==='function')sfxGong();

  const hex = randomHex ? (()=>{
    const r=Math.floor(Math.random()*64);
    const lines=[];for(let i=0;i<6;i++)lines.push((r>>i)&1?'yang':'yin');
    return {number:r+1,name:HEX_NAMES[r]||'El Desconocido',lines,mutLine:Math.floor(Math.random()*6)};
  })() : generateHexagram(question);

  const loadCard = document.createElement('div'); loadCard.className='sess-card';
  loadCard.innerHTML = `<div class="sess-hex">${hexToHTML(hex)}<div class="hex-num">HEXAGRAMA ${hex.number}</div><div class="hex-tit">${esc(hex.name)}</div></div>
    <div class="sess-loading"><div class="spinner"></div><span>${LOAD_PHRASES[Math.floor(Math.random()*LOAD_PHRASES.length)]} ...</span></div>`;
  convoEl.appendChild(loadCard);
  loadCard.querySelector('.sess-hex').scrollIntoView({behavior:'smooth'});
  questionEl.value='';

  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:state.model,question,hexagram:hex,sessionHistory:getSessionHistory()})});
    const data=await res.json().catch(()=>({}));
    loadCard.querySelector('.sess-loading').remove();

    if(!res.ok||data.error){
      statusEl.textContent='error · usando fallback';
      renderCardFallback(loadCard,question,hex);
      showToast('el oráculo calla — interpretación local');
    }else{
      statusEl.textContent=`ORACULO.exe · ${getModelName(data.model||state.model)}`;
      fillCard(loadCard,hex,question,data);
      const session=getActiveSession();
      if(session){
        session.entries.push({ts:Date.now(),question,number:hex.number,name:hex.name,lines:hex.lines,mutLine:hex.mutLine,
          judgment:data.judgment,image:data.image,interpretation:data.interpretation,warning:data.warning||''});
        saveSessions();
      }
      showToast('consulta guardada');
    }
  }catch(e){
    loadCard.querySelector('.sess-loading').remove();
    statusEl.textContent='sin conexión · fallback local';
    renderCardFallback(loadCard,question,hex);
    showToast('sin señal con el oráculo');
  }
  state.busy=false;btnAsk.disabled=false;btnRandom.disabled=false;questionEl.disabled=false;
  questionEl.focus();
}

function fillCard(card,hex,question,data){
  const hexDiv=card.querySelector('.sess-hex');
  hexDiv.innerHTML=`${hexToHTML(hex)}<div class="hex-num">HEXAGRAMA ${hex.number}</div><div class="hex-tit">${esc(hex.name)}</div>`;
  const body=document.createElement('div');body.className='sess-body';
  body.innerHTML=`<div class="sess-question">"${esc(question)}"</div>
    <div class="label">▾ DICTAMEN</div><div class="judgment">${esc(data.judgment||'')}</div>
    <div class="label">▾ IMAGEN</div><div class="image">${esc(data.image||'')}</div>
    ${data.interpretation?`<button class="sess-expand">▾ interpretación completa</button><div class="sess-interp">${esc(data.interpretation)}</div>`:''}
    ${data.warning?`<div class="warning" style="display:block">${esc(data.warning)}</div>`:'<div class="warning"></div>'}`;
  card.appendChild(body);
  card.querySelector('.sess-body').scrollIntoView({behavior:'smooth'});
  const eb=card.querySelector('.sess-expand');
  if(eb)eb.addEventListener('click',()=>{
    const ip=card.querySelector('.sess-interp');ip.classList.toggle('open');
    eb.textContent=ip.classList.contains('open')?'▴ cerrar':'▾ interpretación completa';
  });
  if(data.log&&typeof sfxRender==='function')sfxRender('void');
}

function renderCardFallback(card,question,hex){
  const lineDesc=['la primera','la segunda','la tercera','la cuarta','la quinta','la sexta'];
  const j=`Hexagrama ${hex.number}: ${hex.name}. El oráculo responde sin mediación de la máquina. Las líneas forman un patrón que solo tú puedes leer.`;
  const img=`Seis líneas sobre el vacío. ${hex.lines.filter(l=>l==='yang').length} firmes, ${hex.lines.filter(l=>l==='yin').length} cedentes.`;
  const interp=`Consultaste: "${question.slice(0,120)}". ${lineDesc[hex.mutLine]} línea muta — ahí está la llave. El hexagrama ${hex.number} te señala una tensión entre lo que afirmas y lo que sueltas. No hay respuesta definitiva: el I Ching no predice, revela.`;
  const hexDiv=card.querySelector('.sess-hex');
  hexDiv.innerHTML=`${hexToHTML(hex)}<div class="hex-num">HEXAGRAMA ${hex.number}</div><div class="hex-tit">${esc(hex.name)}</div>`;
  const body=document.createElement('div');body.className='sess-body';
  body.innerHTML=`<div class="sess-question">"${esc(question)}"</div>
    <div class="label">▾ DICTAMEN</div><div class="judgment">${esc(j)}</div>
    <div class="label">▾ IMAGEN</div><div class="image">${esc(img)}</div>
    <button class="sess-expand">▾ interpretación</button><div class="sess-interp">${esc(interp)}</div>`;
  card.appendChild(body);
  card.querySelector('.sess-body').scrollIntoView({behavior:'smooth'});
  const eb=card.querySelector('.sess-expand');
  if(eb)eb.addEventListener('click',()=>{
    const ip=card.querySelector('.sess-interp');ip.classList.toggle('open');
    eb.textContent=ip.classList.contains('open')?'▴ cerrar':'▾ interpretación';
  });
  const session=getActiveSession();
  if(session){
    session.entries.push({ts:Date.now(),question,number:hex.number,name:hex.name,lines:hex.lines,mutLine:hex.mutLine,
      judgment:j,image:img,interpretation:interp,warning:''});
    saveSessions();
  }
}

// events
btnAsk.addEventListener('click',()=>consultar(questionEl.value,false));
btnRandom.addEventListener('click',()=>{consultar('una lectura sin pregunta',true);});
questionEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();consultar(questionEl.value,false);}});
questionEl.addEventListener('input',()=>{btnRandom.disabled=state.busy;});

// ========== AUDIO: ORACULAR MINI ENGINE ==========
var actx=null;
function ac(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}if(actx.state==='suspended')actx.resume();return actx;}
function tone(freq,dur,type,vol,rampTo){
  const a=ac();if(!a||!SND.on)return;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';o.frequency.value=freq;g.gain.value=vol||0.04;
  o.connect(g);g.connect(a.destination);o.start();
  if(rampTo)o.frequency.linearRampToValueAtTime(rampTo,a.currentTime+dur);
  g.gain.setTargetAtTime(0,a.currentTime+dur*0.7,dur*0.2);o.stop(a.currentTime+dur);
}
const SND={on:localStorage.getItem('orasnd')!=='0'};
function sfxGong(){
  if(!SND.on)return;const a=ac();if(!a)return;const now=a.currentTime;
  [131,196,262,330,392].forEach((f,i)=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=f;g.gain.value=0.02/(i+1);
    o.connect(g);g.connect(a.destination);o.start(now);
    g.gain.setTargetAtTime(0,now+0.05+i*0.02,0.1);o.stop(now+0.6);
  });
}
function sfxRender(mood){
  if(!SND.on)return;tone(mood==='void'?160:400,0.3,'triangle',0.02,mood==='void'?80:200);
}
function toggleSound(){
  SND.on=!SND.on;localStorage.setItem('orasnd',SND.on?'1':'0');
  sndBtn.textContent=SND.on?'🔊':'🔇';sndBtn.classList.toggle('muted',!SND.on);
}
sndBtn.addEventListener('click',toggleSound);
if(!SND.on){sndBtn.textContent='🔇';sndBtn.classList.add('muted');}

// ---- init ----
loadSessions();
saveSessions(); // re-render + migrate if needed
if(getActiveSession()){
  showResumeCard();
}
</script>
