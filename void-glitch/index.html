<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VOID//GLITCH — EsquizoAI</title>
<style>
:root{--bg:#020005;--fg:#d9f7d9;--acid:#aaff00;--corrupt:#ff00ff;--red:#ff2020;--amber:#ffb000;--line:#34143a;}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:radial-gradient(circle at 50% 35%,#090012 0%,var(--bg) 55%,#000 100%);color:var(--fg);font-family:monospace;overflow-x:hidden;overflow-y:auto}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,.03) 0 2px,transparent 2px 4px);pointer-events:none;mix-blend-mode:screen;opacity:.25}
body::after{content:"";position:fixed;inset:0;background:radial-gradient(circle at center,transparent 40%,rgba(0,0,0,.8) 100%);pointer-events:none}
.wrap{min-height:100%;height:auto;display:grid;grid-template-rows:auto auto auto auto auto;gap:12px;padding:18px 18px 28px;max-width:980px;margin:0 auto}
.top{display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px;align-items:center;font-size:12px;letter-spacing:.12em;color:#8fbf8f;text-transform:uppercase}
.brand{color:var(--acid);text-shadow:0 0 8px var(--acid)}
.status{color:#c9a8cf}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.controls label{font-size:10px;color:#9f7aa6;letter-spacing:.18em;text-transform:uppercase}
.controls select,.controls button{background:#05000a;color:#e7ffee;border:1px solid #46204f;font-family:inherit;font-size:12px;padding:6px 8px;cursor:pointer}
.controls button:hover,.controls select:hover{border-color:var(--acid)}
.controls .mini{font-size:11px;padding:6px 10px}
.controls .snd{font-size:14px;padding:4px 6px;min-width:32px;text-align:center}
.controls .snd.muted{opacity:.35;border-color:#46204f}
.panel{border:1px solid #3a1440;background:rgba(6,0,12,.82);box-shadow:0 0 0 1px #000 inset,0 0 24px rgba(255,0,255,.08);backdrop-filter:blur(4px)}
.void{position:relative;min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px;text-align:center;overflow:hidden}
.void::before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle,#aaff0007 0%,transparent 40%),radial-gradient(circle at 70% 30%,#ff00ff08 0%,transparent 38%),radial-gradient(circle at 30% 70%,#ff202007 0%,transparent 35%);animation:drift 12s linear infinite}
@keyframes drift{from{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(2%,-1%,0) scale(1.03)}to{transform:translate3d(0,0,0) scale(1)}}
.kicker{font-size:10px;letter-spacing:.32em;color:#a36faa;text-transform:uppercase;margin-bottom:10px;position:relative;z-index:1}
.question{position:relative;z-index:1;font-size:clamp(1.6rem,4vw,3.4rem);line-height:1.05;margin:0;color:var(--acid);text-shadow:0 0 12px rgba(170,255,0,.25),2px 0 var(--corrupt),-2px 0 var(--red)}
.sub{position:relative;z-index:1;margin-top:12px;color:#b89ab8;font-size:13px;max-width:760px;line-height:1.7}
.meters{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.meter{padding:10px 12px;font-size:12px}
.meter b{display:block;font-size:22px;margin-top:4px;color:#fff}
.bar{height:8px;background:#14051a;border:1px solid #33203c;margin-top:8px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,var(--acid),var(--corrupt),var(--red));box-shadow:0 0 12px rgba(170,255,0,.35)}
.choices{display:grid;gap:10px}
.choice{width:100%;text-align:left;padding:14px 16px;background:#05000a;color:#e7ffee;border:1px solid #46204f;cursor:pointer;font-family:inherit;font-size:15px;line-height:1.5;transition:transform .12s,border-color .12s,background .12s}
.choice:hover{transform:translateX(2px);border-color:var(--acid);background:#090014}
.choice small{display:block;color:#9e7fa2;font-size:11px;margin-top:4px}
.log{min-height:160px;max-height:36vh;overflow:auto;padding:14px 16px;font-size:13px;line-height:1.65;color:#d8c0d8}
.log .line{margin:0 0 8px 0;padding-left:10px;border-left:2px solid #3b1745}
.log .line.acid{border-left-color:var(--acid);color:#eaffc7}
.log .line.red{border-left-color:var(--red);color:#ffb7b7}
.log .line.corrupt{border-left-color:var(--corrupt);color:#f0b7ff}
.footer{display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:11px;color:#8e758f;letter-spacing:.08em}
.link{color:var(--acid);text-decoration:none}
.link:hover{text-decoration:underline}
.glitch{animation:glitch .45s steps(2) 1}
@keyframes glitch{0%{transform:none;filter:none}20%{transform:translateX(2px) skewX(4deg)}40%{transform:translateX(-3px) skewX(-8deg)}60%{transform:translateY(1px)}80%{transform:translateX(2px)}100%{transform:none}}
.hardglitch{animation:hardglitch .18s steps(2) infinite}
@keyframes hardglitch{0%{transform:translate(0,0)}25%{transform:translate(2px,-1px)}50%{transform:translate(-2px,1px)}75%{transform:translate(3px,0)}100%{transform:translate(0,0)}}
.void-loading{animation:voidPulse 1.8s ease-in-out infinite}
@keyframes voidPulse{0%,100%{box-shadow:0 0 8px rgba(255,0,255,.15) inset,0 0 2px var(--corrupt)}50%{box-shadow:0 0 28px rgba(170,255,0,.25) inset,0 0 6px var(--corrupt),0 0 18px var(--acid)}}
.typing{display:inline-block;color:var(--amber);font-size:12px;padding:4px 8px}
.typing span{animation:dots 1.1s steps(4) infinite}
@keyframes dots{0%{opacity:.2}30%{opacity:1}}
@media (max-width:800px){.wrap{padding:12px 12px 24px}.meters{grid-template-columns:1fr}.top{flex-direction:column;align-items:flex-start}.question{font-size:clamp(1.35rem,7vw,2.4rem)}.void{min-height:180px}.choice{font-size:14px}.log{max-height:28vh}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="brand">VOID//GLITCH</div>
      <div class="status" id="status">static fallback · depth: 0 · glitch: 0 · caos: 0</div>
    </div>
    <div class="controls">
      <label for="modeSel">MODO</label>
      <select id="modeSel">
        <option value="msn">MSN / una voz</option>
        <option value="terminal">TERMINAL / dos voces</option>
        <option value="static">STATIC / fallback</option>
      </select>
      <label for="modelSel">MODELO</label>
      <select id="modelSel"></select>
      <label for="partnerSel" id="partnerLabel">PAREJA</label>
      <select id="partnerSel"></select>
      <button class="mini" id="syncBtn">LIVE</button>
      <button class="mini snd" id="sndBtn" title="toggle sonido">🔊</button>
    </div>
  </div>

  <div class="panel void" id="voidBox">
    <div class="kicker" id="kicker">cargando motor...</div>
    <h1 class="question" id="qText">¿Quieres entrar al vacío?</h1>
    <div class="sub" id="subText">Nada aquí termina. Cada respuesta abre otra grieta.</div>
    <div id="typing" class="typing" style="display:none;position:relative;z-index:1;margin-top:14px;">generando<span>…</span></div>
  </div>

  <div class="meters">
    <div class="panel meter">VOID<b id="mVoid">0</b><div class="bar"><div class="fill" id="fVoid"></div></div></div>
    <div class="panel meter">GLITCH<b id="mGlitch">0</b><div class="bar"><div class="fill" id="fGlitch"></div></div></div>
    <div class="panel meter">CAOS<b id="mChaos">0</b><div class="bar"><div class="fill" id="fChaos"></div></div></div>
  </div>

  <div class="panel choices" id="choices"></div>
  <div class="panel log" id="log"></div>

  <div class="footer">
    <a class="link" href="../index.html">volver al OS</a>
    <button class="choice" id="restartBtn" style="padding:8px 12px;font-size:12px;width:auto">reiniciar caída</button>
  </div>
</div>

<script>
const API = '/api/void-glitch';
const LEGACY_DAEMON_API = '/api/daemon';
const LEGACY_TERMINAL_API = '/api/terminal';
const MODELS = [
  ['llama-3.3-70b-versatile','Llama 3.3 70B'],
  ['llama-3.1-8b-instant','Llama 3.1 8B'],
  ['meta-llama/llama-4-scout-17b-16e-instruct','Llama 4 Scout 17B'],
  ['qwen/qwen3-32b','Qwen 3 32B'],
  ['openai/gpt-oss-120b','GPT-OSS 120B'],
  ['openai/gpt-oss-20b','GPT-OSS 20B'],
  ['deepseek-chat','DeepSeek V4 (chat)'],
];

const STATIC = {
  start:{text:'¿Quieres entrar al vacío?',sub:'No existe una salida limpia. Solo rutas que se deforman.',choices:[
    {label:'sí, caigo',next:'q1',note:'el usuario aceptó la grieta.'},
    {label:'más preguntas',next:'q2',note:'la curiosidad mordió el borde.'},
    {label:'no existe salida',next:'q3',note:'negación confirmada como portal.'}
  ]},
  q1:{text:'¿Qué buscas en la oscuridad?',sub:"Si la respuesta es 'sentido', el sistema la rompe.",choices:[
    {label:'sentido',next:'q4',note:'el sentido se descompone.'},
    {label:'ruido',next:'q5',note:'ruido detectado: energía útil.'},
    {label:'nada',next:'q6',note:'nada como combustible.'}
  ]},
  q2:{text:'Si insistes, ¿qué rompe primero: la forma o la idea?',sub:'Pregunta trampa. Ambas se muerden.',choices:[
    {label:'la forma',next:'q5',note:'la forma parpadea.'},
    {label:'la idea',next:'q4',note:'la idea se derrite.'},
    {label:'las dos',next:'q7',note:'doble colapso.'}
  ]},
  q3:{text:'¿Quién te dijo que el no era una puerta?',sub:'El vacío siempre se disfraza de límite.',choices:[
    {label:'nadie',next:'q6',note:'silencio como llave.'},
    {label:'mi reflejo',next:'q5',note:'reflejo corrupto.'},
    {label:'el sistema',next:'q7',note:'autoridad derramada.'}
  ]},
  q4:{text:'Caes más hondo. ¿Aún quieres nombrarlo?',sub:'Nombrar lo que cae también lo deforma.',choices:[
    {label:'sí',next:'q8',note:'nombrar no salva, pero abre.'},
    {label:'no',next:'q5',note:'el nombre se corrompió.'}
  ]},
  q5:{text:'Glitch way: las letras empiezan a mirar de vuelta.',sub:'Cuando el texto te devuelve la vista, ya vas tarde.',choices:[
    {label:'seguir',next:'q8',note:'seguimiento en zona rota.'},
    {label:'parar',next:'q6',note:'parada aparente.'}
  ]},
  q6:{text:'Falso cierre: parece que termina. No termina.',sub:'La salida que ves es solo otra entrada más abajo.',choices:[
    {label:'entrar otra vez',next:'q7',note:'retorno al umbral.'},
    {label:'romper el cierre',next:'q8',note:'la bisagra cedió.'}
  ]},
  q7:{text:'Caos generativo: el sistema empieza a producir residuo vivo.',sub:'Fragmentos, ecos, manifiestos cortados. Todo insiste.',choices:[
    {label:'absorber el residuo',next:'end1',note:'el residuo fue digerido.'},
    {label:'dejar que siga',next:'end2',note:'el residuo tomó el mando.'}
  ]},
  q8:{text:'Última capa visible: el borde te reconoce.',sub:'No estás resolviendo el vacío. El vacío te está escribiendo.',choices:[
    {label:'aceptar',next:'end1',note:'aceptación sin salida.'},
    {label:'rechazar',next:'end2',note:'rechazo reciclado como mutación.'},
    {label:'volver al inicio',next:'start',note:'reinicio con cicatriz.'}
  ]},
  end1:{text:'Falso final: sobrevives, pero ya no eres igual.',sub:'La caída cerró una puerta y abrió el expediente.',choices:[
    {label:'volver a caer',next:'start',note:'el ciclo se alimenta.'}
  ]},
  end2:{text:'El glitch te deja pasar. El caos te usa de pasillo.',sub:'No hay victoria. Solo mutación con ruido.',choices:[
    {label:'volver a caer',next:'start',note:'mutación reingresa al vacío.'}
  ]}
};

const state = { mode:'msn', model:MODELS[0][0], partner:MODELS[3][0], depth:0, glitch:0, chaos:0, history:[], staticKey:'start', liveNode:null, busy:false };
const $ = s => document.querySelector(s);
const voidBox = $('#voidBox'), qText = $('#qText'), subText = $('#subText'), choicesEl = $('#choices'), logEl = $('#log');
const statusEl = $('#status'), mVoid = $('#mVoid'), mGlitch = $('#mGlitch'), mChaos = $('#mChaos'), fVoid = $('#fVoid'), fGlitch = $('#fGlitch'), fChaos = $('#fChaos');
const modeSel = $('#modeSel'), modelSel = $('#modelSel'), partnerSel = $('#partnerSel'), partnerLabel = $('#partnerLabel'), syncBtn = $('#syncBtn'), typing = $('#typing'), kickerEl = $('#kicker');

function getModelName(id){ const m = MODELS.find(x => x[0] === id); return m ? m[1] : id; }
function renderKicker(source){
  const mName = getModelName(state.model);
  if (state.mode === 'static' || source === 'static') { kickerEl.textContent = 'STATIC · fallback pre-escrito · offline'; }
  else if (state.mode === 'terminal') { const pName = getModelName(state.partner); kickerEl.textContent = `TERMINAL · ${mName}  //  ${pName}`; }
  else { kickerEl.textContent = `MSN · PSYCHO_BOT · ${mName}`; }
}
function populateModels(){
  modelSel.innerHTML = MODELS.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
  partnerSel.innerHTML = MODELS.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
  modelSel.value = state.model; partnerSel.value = state.partner;
}
function clamp(n,min,max){ return Math.max(min,Math.min(max,n)); }
function lineKindFromMode(m){ return m === 'chaos' ? 'corrupt' : m === 'reset' ? 'red' : 'acid'; }
function renderLog(){ logEl.innerHTML = state.history.slice(-10).map(h => `<p class="line ${h.kind||''}">» ${escapeHtml(h.txt)}</p>`).join(''); logEl.scrollTop = logEl.scrollHeight; }
function renderMeters(){
  mVoid.textContent = state.depth; mGlitch.textContent = state.glitch; mChaos.textContent = state.chaos;
  fVoid.style.width = clamp(state.depth*11,0,100) + '%';
  fGlitch.style.width = clamp(state.glitch*12,0,100) + '%';
  fChaos.style.width = clamp(state.chaos*12,0,100) + '%';
  const mName = getModelName(state.model);
  const modeLabel = state.mode === 'static' ? 'STATIC' : state.mode === 'terminal' ? `TERMINAL · ${mName} // ${getModelName(state.partner)}` : `MSN · ${mName}`;
  statusEl.textContent = `${modeLabel} · depth: ${state.depth} · glitch: ${state.glitch} · caos: ${state.chaos}`;
  statusEl.style.color = state.mode === 'static' ? '#8e758f' : state.mode === 'terminal' ? '#ffb000' : '#c9a8cf';
  if (typeof updateAmbient === 'function') updateAmbient();
}
function escapeHtml(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function pulse(){ voidBox.classList.remove('glitch'); voidBox.offsetHeight; voidBox.classList.add('glitch'); if(state.glitch >= 4) voidBox.classList.add('hardglitch'); else voidBox.classList.remove('hardglitch'); }
function showTyping(on){
  typing.style.display = on ? 'inline-block' : 'none';
  if (on) {
    const O=['el vacío consulta las líneas mutantes...','VALIS interfiere la transmisión...','el hexagrama se quiebra...','la máquina oracular procesa tu caída...','el oráculo glitch computa la grieta...','las voces del abismo deliberan...'];
    typing.innerHTML = `${O[Math.floor(Math.random()*O.length)]}<span>…</span>`;
  }
}
function setBusy(on){ state.busy = on; syncBtn.disabled = on; modeSel.disabled = on; modelSel.disabled = on; partnerSel.disabled = on; renderControls(); showTyping(on); if(on){voidBox.classList.add('void-loading');if(typeof sfxTyping==='function')sfxTyping(true);}else{voidBox.classList.remove('void-loading');} }
function renderControls(){
  const terminal = modeSel.value === 'terminal';
  partnerSel.style.display = terminal ? '' : 'none';
  partnerLabel.style.display = terminal ? '' : 'none';
  syncBtn.textContent = modeSel.value === 'static' ? 'STATIC' : 'LIVE';
}
function currentStatic(){ return STATIC[state.staticKey] || STATIC.start; }
function extractJson(text){
  if(!text || typeof text !== 'string') return null;
  const a=text.indexOf('{'), b=text.lastIndexOf('}');
  if(a < 0 || b < 0 || b <= a) return null;
  try { return JSON.parse(text.slice(a,b+1)); } catch { return null; }
}
function normalizeNode(node, fallback){
  const base=fallback || {};
  const choices=Array.isArray(node?.choices) ? node.choices : [];
  return {
    title: String(node?.title || base.title || 'VOID//GLITCH').slice(0,90),
    text: String(node?.text || base.text || 'La señal falla.').slice(0,380),
    sub: String(node?.sub || base.sub || 'Otra grieta más abajo.').slice(0,280),
    log: String(node?.log || base.log || 'registro: señal inestable').slice(0,200),
    mood: ['void','glitch','chaos','reset'].includes(node?.mood) ? node.mood : 'void',
    visual: {
      voidDelta: Number.isFinite(node?.visual?.voidDelta) ? node.visual.voidDelta : 0,
      glitchDelta: Number.isFinite(node?.visual?.glitchDelta) ? node.visual.glitchDelta : 0,
      chaosDelta: Number.isFinite(node?.visual?.chaosDelta) ? node.visual.chaosDelta : 0,
    },
    choices: choices.slice(0,3).map((c, i) => ({
      label: String(c?.label || `continuar ${i+1}`).slice(0,80),
      note: String(c?.note || 'la grieta continúa').slice(0,120),
    })),
  };
}
function synthesizeNodeFromText(text, fallback){
  const lines = String(text || '').split(/\r?\n+/).map(s=>s.trim()).filter(Boolean);
  const head = lines[0] || fallback?.text || 'El vacío respondió, pero vino roto.';
  const sub = lines[1] || fallback?.sub || 'La grieta sigue viva.';
  const choices = (fallback?.choices || [{label:'seguir', note:'la grieta continúa', next:'start'}]).slice(0,3);
  return normalizeNode({
    title: fallback?.title || 'VOID//GLITCH',
    text: head,
    sub,
    log: lines[2] || 'fallback textual: motor activo pero caótico',
    mood: 'void',
    visual: { voidDelta: 0, glitchDelta: 0, chaosDelta: 0 },
    choices,
  }, fallback);
}
function renderNode(node, source='static'){
  renderKicker(source);
  if (node.mood && typeof sfxRender === 'function') sfxRender(node.mood);
  const title = node.title || 'VOID//GLITCH';
  voidBox.classList.remove('glitch'); voidBox.offsetHeight; voidBox.classList.add('glitch');
  if(state.glitch >= 4) voidBox.classList.add('hardglitch'); else voidBox.classList.remove('hardglitch');
  qText.textContent = node.text || title;
  subText.textContent = node.sub || '';
  choicesEl.innerHTML = '';
  const choices = Array.isArray(node.choices) && node.choices.length ? node.choices : [{label:'volver al inicio', note:'reparar la grieta', next:'start'}];
  choices.forEach((c, idx) => {
    const b = document.createElement('button');
    b.className = 'choice';
    b.innerHTML = `${escapeHtml(c.label)}<small>${escapeHtml(c.note || 'la grieta continúa')}</small>`;
    b.addEventListener('click', () => onChoice(c, idx, source));
    choicesEl.appendChild(b);
  });
  voidBox.scrollIntoView({behavior:'smooth'});
}
function fallbackAdvance(choiceIndex){
  const cur = currentStatic();
  const next = cur.choices?.[choiceIndex]?.next || 'start';
  state.staticKey = next;
  renderNode(currentStatic(), 'static');
}
function pushHistory(kind, txt){ state.history.push({kind, txt}); if(state.history.length > 20) state.history.shift(); renderLog(); if (kind === 'red' && typeof sfxFallback === 'function') sfxFallback(); }
async function fetchStructured(apiUrl, payload){
  const res = await fetch(apiUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}
async function fetchLive(choice, choiceIndex){
  const base = {
    mode: state.mode,
    model: state.model,
    partnerModel: state.partner,
    state: { void: state.depth, glitch: state.glitch, chaos: state.chaos },
    node: state.liveNode || currentStatic(),
    choice: choice ? { label: choice.label, note: choice.note } : null,
    history: state.history.slice(-6).map(h => ({ role: h.kind === 'red' ? 'assistant' : 'user', content: h.txt })),
  };

  const schemaPrompt = `Devuelve SOLO JSON válido con la forma exacta: {"title":string,"text":string,"sub":string,"log":string,"mood":"void"|"glitch"|"chaos"|"reset","visual":{"voidDelta":number,"glitchDelta":number,"chaosDelta":number},"choices":[{"label":string,"note":string}]}.`;

  const apiPlan = [API, state.mode === 'terminal' ? LEGACY_TERMINAL_API : LEGACY_DAEMON_API, state.mode === 'terminal' ? LEGACY_DAEMON_API : LEGACY_TERMINAL_API];
  const errors = [];

  for (const apiUrl of apiPlan) {
    try {
      if (apiUrl === API) {
        const data = await fetchStructured(apiUrl, base);
        if (data?.node) return data;
        throw new Error('sin nodo estructurado');
      }

      if (apiUrl === LEGACY_DAEMON_API) {
        const legacyMessages = [
          { role:'system', content:'Eres el motor de VOID//GLITCH. Responde SOLO con JSON válido, sin markdown, sin explicación. Voz peruana, usa "tú", "tienes", "prueba", "escribe".' },
          { role:'user', content: `${schemaPrompt}\n\nESTADO:\n${JSON.stringify(base, null, 2)}` },
        ];
        const data = await fetchStructured(apiUrl, { model: state.model, messages: legacyMessages, temperature: 1.05 });
        const parsed = data?.content ? extractJson(data.content) : null;
        return { ok:true, mode:state.mode, model:state.model, partnerModel:state.partner, node: normalizeNode(parsed, currentStatic()), raw: data?.content || '' };
      }

      if (apiUrl === LEGACY_TERMINAL_API) {
        const grimorio = {
          titulo: 'VOID//GLITCH',
          esencia: 'motor de caída interactiva',
          conceptos_clave: ['void', 'glitch', 'caos', 'espiral', 'falso cierre'],
          citas_importantes: ['El vacío te está escribiendo.', 'La salida es otra entrada.'],
          preguntas_centrales: ['¿Quieres entrar?', '¿Qué rompe primero?'],
        };
        const initialPrompt = `${schemaPrompt}\n\nESTADO:\n${JSON.stringify(base, null, 2)}\n\nResponde SOLO con JSON válido.`;
        const data = await fetchStructured(apiUrl, { model: state.partner, modelName: state.model, otherModelName: state.partner, grimorio, history: base.history, initialPrompt, useStreaming: true, temperature: 1.0 });
        const parsed = data?.content ? extractJson(data.content) : null;
        return { ok:true, mode:state.mode, model:state.model, partnerModel:state.partner, node: normalizeNode(parsed, currentStatic()), raw: data?.content || '' };
      }
    } catch (e) {
      errors.push(`${apiUrl}: ${e.message}`);
    }
  }

  throw new Error(errors.join(' | ') || 'sin motores disponibles');
}
async function onChoice(choice, choiceIndex, source){
  if (typeof sfxChoice === 'function') sfxChoice();
  const fallbackNext = currentStatic().choices?.[choiceIndex]?.next || 'start';
  state.staticKey = fallbackNext;
  state.depth += 1;
  state.glitch += choice?.glitch || 0;
  state.chaos += choice?.chaos || 0;
  pushHistory(choice?.chaos ? 'corrupt' : choice?.glitch ? 'acid' : '', choice?.note || choice?.label || '…');
  renderMeters();

  if (state.mode === 'static' || source === 'static') {
    fallbackAdvance(choiceIndex);
    return;
  }

  setBusy(true);
  try {
    const data = await fetchLive(choice, choiceIndex);
    state.liveNode = data.node || null;
    const v = data.node?.visual || {};
    if (Number.isFinite(v.voidDelta)) state.depth += v.voidDelta;
    if (Number.isFinite(v.glitchDelta)) state.glitch += v.glitchDelta;
    if (Number.isFinite(v.chaosDelta)) state.chaos += v.chaosDelta;
    if (data.node?.log) pushHistory(lineKindFromMode(data.node.mood || 'void'), data.node.log);
    setBusy(false);
    renderMeters();
    revealLiveNode(data.node);
  } catch (e) {
    pushHistory('red', 'motor vivo caído: ' + e.message + ' → fallback activado');
    setBusy(false);
    fallbackAdvance(choiceIndex);
  }
}
function revealLiveNode(node){
  const n = node || currentStatic();
  setTimeout(() => {
    voidBox.classList.remove('glitch'); voidBox.offsetHeight; voidBox.classList.add('glitch');
    if (state.glitch >= 4) voidBox.classList.add('hardglitch');
    if (n.mood && typeof sfxRender === 'function') sfxRender(n.mood);
    qText.textContent = n.text || n.title || 'El vacío respondió, pero vino roto.';
    subText.textContent = n.sub || 'La grieta sigue viva.';
    choicesEl.innerHTML = '';
    (n.choices || [{label:'volver a caer', note:'el ciclo se alimenta'}]).forEach((c, idx) => {
      const b = document.createElement('button');
      b.className = 'choice';
      b.innerHTML = `${escapeHtml(c.label)}<small>${escapeHtml(c.note || 'la grieta continúa')}</small>`;
      b.addEventListener('click', () => onChoice(c, idx, 'live'));
      choicesEl.appendChild(b);
    });
    voidBox.scrollIntoView({behavior:'smooth'});
  }, 500);
}
async function bootLive(){
  if (state.mode === 'static') {
    state.liveNode = null;
    renderKicker('static');
    renderNode(currentStatic(), 'static');
    return;
  }
  renderKicker('live');
  setBusy(true);
  try {
    const data = await fetchLive(null, 0);
    state.liveNode = data.node || null;
    if (data.node?.log) pushHistory(lineKindFromMode(data.node.mood || 'void'), data.node.log);
    renderMeters();
    renderNode(data.node || currentStatic(), 'live');
    if (typeof startAmbient === 'function') startAmbient();
  } catch (e) {
    const mName = getModelName(state.model);
    pushHistory('red', `API caída · ${mName} no responde → usando fallback estático`);
    pushHistory('red', 'verifica las API keys en Vercel (GROQ_API_KEY / DEEPSEEK_API_KEY)');
    state.mode = 'static';
    modeSel.value = 'static';
    renderControls();
    renderKicker('static');
    renderMeters();
    renderNode(currentStatic(), 'static');
  } finally {
    setBusy(false);
  }
}
function resetGame(){
  state.depth = 0; state.glitch = 0; state.chaos = 0; state.history = [{kind:'acid', txt:'nuevo arranque del vacío.'}];
  state.staticKey = 'start'; state.liveNode = null;
  renderLog(); renderMeters(); renderKicker(state.mode==='static'?'static':'live');
  if (state.mode === 'static') renderNode(currentStatic(), 'static');
  else bootLive();
  if (typeof sfxBoot === 'function') sfxBoot();
}

modeSel.addEventListener('change', async () => { state.mode = modeSel.value; renderControls(); renderKicker(state.mode==='static'?'static':'live'); resetGame(); });
modelSel.addEventListener('change', () => { state.model = modelSel.value; pushHistory('acid', 'cabeza principal → ' + getModelName(state.model)); renderMeters(); renderKicker(state.mode==='static'?'static':'live'); });
partnerSel.addEventListener('change', () => { state.partner = partnerSel.value; pushHistory('corrupt', 'pareja → ' + getModelName(state.partner)); renderMeters(); renderKicker(state.mode==='static'?'static':'live'); });
syncBtn.addEventListener('click', () => resetGame());
$('#restartBtn').addEventListener('click', () => resetGame());

populateModels();
renderControls();
state.history.push({kind:'acid', txt:'el usuario abrió la grieta.'});
renderLog();
renderMeters();
renderNode(currentStatic(), 'static');

// intento inicial live salvo que arranque en static
setTimeout(() => { if (state.mode !== 'static') bootLive(); }, 180);

// ========== AUDIO ENGINE: ORACULAR GLITCH ==========
var actx=null, ambientOn=false, drumTimer=null, drumAc=null;
var dronOscA=null, dronOscB=null, dronGain=null, dronFilter=null, dronDist=null, dronDelay=null, dronLFO=null, dronLFOGain=null;
const SND={on:localStorage.getItem('vgsnd')!=='0'};

function ac(){
  if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(actx.state==='suspended')actx.resume();
  return actx;
}
function noiseBuf(dur){
  const a=ac();if(!a)return null;
  const len=a.sampleRate*dur,buf=a.createBuffer(1,len,a.sampleRate),ch=buf.getChannelData(0);
  for(let i=0;i<len;i++)ch[i]=Math.random()*2-1;
  return buf;
}
function tone(freq,dur,type,vol,rampTo){
  const a=ac();if(!a||!SND.on)return;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';o.frequency.value=freq;g.gain.value=vol||0.04;
  o.connect(g);g.connect(a.destination);o.start();
  if(rampTo)o.frequency.linearRampToValueAtTime(rampTo,a.currentTime+dur);
  g.gain.setTargetAtTime(0,a.currentTime+dur*0.7,dur*0.2);
  o.stop(a.currentTime+dur);
}
function distCurve(amt){
  const n=44100,curve=new Float32Array(n),k=Math.max(0,Math.min(amt*20,400));
  for(let i=0;i<n;i++){const x=(i*2)/n-1;curve[i]=Math.tanh(k*x)/Math.tanh(k)||x;}
  return curve;
}

function kick(freq=110,vol=0.06){
  const a=ac();if(!a||!SND.on)return;
  const now=a.currentTime,o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.setValueAtTime(freq,now);
  o.frequency.exponentialRampToValueAtTime(35,now+0.12);
  g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
  const f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=200;
  o.connect(f);f.connect(g);g.connect(a.destination);
  o.start(now);o.stop(now+0.3);
}

function startDrums(){
  stopDrums();if(!ambientOn||!SND.on)return;
  scheduleDrums();
}
function stopDrums(){if(drumTimer){clearTimeout(drumTimer);drumTimer=null;}}
function scheduleDrums(){
  if(!ambientOn||!SND.on){stopDrums();return;}
  const g=state.glitch,c=state.chaos;
  const interval=clamp(2200-g*200-c*250,300,2500);
  kick(clamp(130-g*10-c*5,50,180),clamp(0.04+g*0.008,0.02,0.1));
  drumTimer=setTimeout(scheduleDrums,interval);
}

function glitchDrop(){
  if(!SND.on||!dronGain)return;
  const a=ac();if(!a)return;
  const now=a.currentTime;
  // duck drone
  dronGain.gain.setValueAtTime(dronGain.gain.value||0.06,now);
  dronGain.gain.linearRampToValueAtTime(0.005,now+0.06);
  dronGain.gain.linearRampToValueAtTime(0.06,now+0.8);
  // extreme distortion burst
  if(dronDist){dronDist.curve=distCurve(18);
    setTimeout(()=>{if(dronDist){const g=state.glitch;dronDist.curve=distCurve(g*0.5);}},300);}
  // noise tear
  const buf=noiseBuf(0.25);if(buf){const sn=a.createBufferSource();sn.buffer=buf;
    const sg=a.createGain();sg.gain.setValueAtTime(0.06,now);sg.gain.exponentialRampToValueAtTime(0.001,now+0.25);
    const f=a.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(3000,now);
    f.frequency.exponentialRampToValueAtTime(200,now+0.2);f.Q.value=8;
    sn.connect(f);f.connect(sg);sg.connect(a.destination);
    sn.start(now);sn.stop(now+0.3);}
  // percussive strike
  kick(70,0.09);setTimeout(()=>kick(55,0.06),120);
}

function startAmbient(){
  const a=ac();if(!a||ambientOn||!SND.on)return;ambientOn=true;
  dronOscA=a.createOscillator();dronOscB=a.createOscillator();
  dronGain=a.createGain();dronGain.gain.value=0;
  dronFilter=a.createBiquadFilter();dronFilter.type='lowpass';dronFilter.frequency.value=200;dronFilter.Q.value=6;
  dronDist=a.createWaveShaper();dronDist.curve=distCurve(0);
  dronDelay=a.createDelay(0.3);dronDelay.delayTime.value=0.18;
  const fb=a.createGain();fb.gain.value=0.12;
  dronLFO=a.createOscillator();dronLFOGain=a.createGain();
  dronLFO.type='sine';dronLFO.frequency.value=0.25;dronLFOGain.gain.value=25;
  dronLFO.connect(dronLFOGain);dronLFOGain.connect(dronFilter.frequency);
  dronOscA.type='sawtooth';dronOscB.type='sawtooth';
  dronOscA.frequency.value=55;dronOscB.frequency.value=55.5;
  dronOscA.connect(dronDist);dronOscB.connect(dronDist);
  dronDist.connect(dronFilter);dronFilter.connect(dronDelay);
  dronDelay.connect(fb);fb.connect(dronDelay);
  dronDelay.connect(dronGain);dronGain.connect(a.destination);
  dronOscA.start();dronOscB.start();dronLFO.start();
  dronGain.gain.setTargetAtTime(0.05,a.currentTime+0.4,0.7);
  setTimeout(()=>startDrums(),500);
}

function updateAmbient(){
  const a=ac();if(!a||!ambientOn||!SND.on)return;
  const v=state.depth,g=state.glitch,c=state.chaos,now=a.currentTime;
  const bf=clamp(55-v*3,25,80);
  dronOscA.frequency.setTargetAtTime(bf,now,0.3);
  dronOscB.frequency.setTargetAtTime(bf+0.5+g*0.8,now,0.3);
  dronDist.curve=distCurve(g*0.5);
  dronFilter.frequency.value=clamp(160+g*280+c*80,60,2800);
  dronFilter.Q.setTargetAtTime(clamp(2+g*3,0.5,28),now,0.3);
  dronDelay.delayTime.setTargetAtTime(clamp(0.18-c*0.02,0.04,0.25),now,0.5);
  dronOscB.detune.setTargetAtTime(g*10+c*15,now,0.3);
  dronLFO.frequency.setTargetAtTime(clamp(0.2+g*0.3+c*0.2,0.08,3),now,0.5);
  dronLFOGain.gain.setTargetAtTime(clamp(18+g*30+c*20,5,180),now,0.5);
  const vol=clamp(0.04+g*0.015+c*0.01,0.01,0.12);
  dronGain.gain.setTargetAtTime(vol,now,0.4);
}

function sfxBoot(){
  if(!SND.on)return;
  const a=ac();if(!a)return;
  const now=a.currentTime;
  // sub-bass rumble opening
  const oR=a.createOscillator(),gR=a.createGain();
  oR.type='sine';oR.frequency.value=28;gR.gain.value=0.08;
  oR.connect(gR);gR.connect(a.destination);
  oR.start(now);oR.frequency.linearRampToValueAtTime(55,now+0.9);
  gR.gain.setTargetAtTime(0,now+0.6,0.25);oR.stop(now+1.0);
  // mid sweep portal
  const oS=a.createOscillator(),gS=a.createGain();
  oS.type='sawtooth';oS.frequency.value=180;gS.gain.value=0.03;
  oS.connect(gS);gS.connect(a.destination);
  oS.start(now);oS.frequency.linearRampToValueAtTime(600,now+0.5);
  gS.gain.setTargetAtTime(0,now+0.35,0.15);oS.stop(now+0.6);
  // sparkle
  const buf=noiseBuf(0.2);if(buf){const sn=a.createBufferSource();sn.buffer=buf;
    const sg=a.createGain();sg.gain.value=0.04;const f=a.createBiquadFilter();
    f.type='highpass';f.frequency.value=3000;
    sn.connect(f);f.connect(sg);sg.connect(a.destination);
    sn.start(now);sg.gain.setTargetAtTime(0,now+0.15,0.08);sn.stop(now+0.25);}
  setTimeout(()=>{if(ambientOn&&dronGain)dronGain.gain.setTargetAtTime(0.05,a.currentTime,0.9);},400);
}

function sfxChoice(){
  if(!SND.on)return;
  const a=ac();if(!a)return;
  const now=a.currentTime;
  // gong oracular: 5 harmonics
  [110,165,220,293,440].forEach((f,i)=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.value=0.025/(i+1);
    o.connect(g);g.connect(a.destination);
    o.start(now);
    g.gain.setTargetAtTime(0,now+0.04+i*0.015,0.12);
    o.stop(now+0.55);
  });
  // glitch flicker tail
  setTimeout(()=>{
    const o2=a.createOscillator(),g2=a.createGain();
    o2.type='square';o2.frequency.value=2200;
    g2.gain.value=0.012;
    o2.connect(g2);g2.connect(a.destination);
    o2.start();o2.frequency.setTargetAtTime(350,a.currentTime+0.1,0.08);
    g2.gain.setTargetAtTime(0,a.currentTime+0.07,0.03);
    o2.stop(a.currentTime+0.16);
  },70);
}

function sfxRender(mood){
  if(!SND.on)return;
  const a=ac();if(!a)return;
  const now=a.currentTime;
  if(mood==='void'){
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=35;g.gain.value=0.04;
    o.connect(g);g.connect(a.destination);
    o.start(now);g.gain.setTargetAtTime(0.06,now+0.15,0.08);
    g.gain.setTargetAtTime(0,now+0.3,0.12);o.stop(now+0.45);
  }else if(mood==='glitch'){
    const buf=noiseBuf(0.15);if(buf){const sn=a.createBufferSource();sn.buffer=buf;
      const sg=a.createGain();sg.gain.value=0.02;const f=a.createBiquadFilter();
      f.type='bandpass';f.frequency.value=1200;f.Q.value=20;
      sn.connect(f);f.connect(sg);sg.connect(a.destination);
      sn.start(now);f.frequency.setTargetAtTime(400,now+0.1,0.06);
      sg.gain.setTargetAtTime(0,now+0.1,0.05);sn.stop(now+0.2);}
  }else if(mood==='chaos'){
    glitchDrop();
    const buf=noiseBuf(0.2);if(buf){const sn=a.createBufferSource();sn.buffer=buf;
      const sg=a.createGain();sg.gain.value=0.025;const f=a.createBiquadFilter();
      f.type='bandpass';f.frequency.value=2000;f.Q.value=3;
      sn.connect(f);f.connect(sg);sg.connect(a.destination);
      sn.start(now);f.frequency.setTargetAtTime(200,now+0.18,0.1);
      sg.gain.setTargetAtTime(0,now+0.15,0.07);sn.stop(now+0.25);}
  }else{
    tone(660,0.12,'sine',0.02);setTimeout(()=>tone(880,0.14,'sine',0.018),40);
  }
}

function sfxTyping(on){
  if(!on||!SND.on)return;
  const a=ac();if(!a)return;
  const now=a.currentTime;
  // ethereal chime: two distant harmonics
  [880,1320].forEach((f,i)=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=f;g.gain.value=0.008;
    o.connect(g);g.connect(a.destination);
    o.start(now+i*0.02);
    g.gain.setTargetAtTime(0,now+0.06,0.03);
    o.stop(now+0.12);
  });
}

function sfxFallback(){
  if(!SND.on)return;
  if(dronGain){const a=ac();if(a){dronDist.curve=distCurve(12);
    dronGain.gain.setValueAtTime(0.14,a.currentTime);
    dronGain.gain.setTargetAtTime(0,a.currentTime+0.2,0.06);}}
  tone(35,0.4,'sine',0.07);ambientOn=false;stopDrums();
}

function toggleSound(){
  SND.on=!SND.on;localStorage.setItem('vgsnd',SND.on?'1':'0');
  const btn=document.getElementById('sndBtn');
  if(btn){btn.textContent=SND.on?'🔊':'🔇';btn.classList.toggle('muted',!SND.on);}
  if(!SND.on&&dronGain){const a=ac();if(a)dronGain.gain.setTargetAtTime(0,a.currentTime,0.05);stopDrums();}
  else if(SND.on&&ambientOn&&dronGain){const a=ac();if(a)dronGain.gain.setTargetAtTime(0.05,a.currentTime,0.3);startDrums();}
}

// init sound button
document.getElementById('sndBtn').addEventListener('click',toggleSound);
if(!SND.on){const btn=document.getElementById('sndBtn');btn.textContent='🔇';btn.classList.add('muted');}
</script>
